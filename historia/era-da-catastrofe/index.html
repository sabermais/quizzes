    source: "PERASSOLO, João. Fascismo faz das notícias espetáculo. Folha de S.Paulo, 7 mar. 2020.",
    options: [
      "Apresentaram-se como líderes pacifistas que resolveriam os conflitos por meio de negociações diplomáticas",

let current=0, answers=new Array(questions.length).fill(null), streak=0, maxStreak=0, score=0;

function render(){
  const q=questions[current];
  document.getElementById('q-header').textContent=`Questão ${current+1} de ${questions.length}`;
  const sb=document.getElementById('source-box');
  if(q.source){sb.style.display='block';sb.textContent=q.source;}else{sb.style.display='none';}
  document.getElementById('q-text').textContent=q.q;
  const od=document.getElementById('options');
  od.innerHTML='';
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.textContent=`${String.fromCharCode(65+i)}) ${opt}`;
    btn.onclick=()=>selectAnswer(i);
    if(answers[current]!==null){
      btn.disabled=true;
      if(i===q.correct)btn.classList.add('correct');
      else if(i===answers[current])btn.classList.add('wrong');
    }
    od.appendChild(btn);
  });
  const fb=document.getElementById('feedback-box');
  if(answers[current]!==null){
    fb.style.display='block';
    fb.className=answers[current]===q.correct?'correct':'wrong';
    fb.textContent=`${answers[current]===q.correct?'✅':'❌'} ${q.feedback}`;
  }else{fb.style.display='none';}
  document.getElementById('btn-back').disabled=current===0;
  document.getElementById('btn-next').textContent=current===questions.length-1?'Ver Resultado 🏆':'Próxima →';
  document.getElementById('progress-bar').style.width=((current+1)/questions.length*100)+'%';
}

function selectAnswer(i){
  if(answers[current]!==null)return;
  answers[current]=i;
  if(i===questions[current].correct){streak++;if(streak>maxStreak)maxStreak=streak;showStreak();}
  else{streak=0;hideStreak();}
  render();
}

function showStreak(){
  if(streak<2){hideStreak();return;}
  const b=document.getElementById('streak-badge');
  const msgs=['','','2 seguidas! 🔥','Hat-trick! 🔥🔥','Incrível! 4! 💥'];
  b.textContent=streak<msgs.length?msgs[streak]:`Lendário! ${streak} seguidas! 💥`;
  b.style.display='block';
}
function hideStreak(){document.getElementById('streak-badge').style.display='none';}

function navigate(dir){
  const n=current+dir;
  if(n<0)return;
  if(n>=questions.length){showFinal();return;}
  current=n;render();
}

function showFinal(){
  score=answers.filter((a,i)=>a===questions[i].correct).length;
  const total=questions.length,pct=Math.round(score/total*100);
  document.getElementById('quiz-card').style.display='none';
  document.getElementById('progress-bar-wrap').style.display='none';
  hideStreak();
  const fs=document.getElementById('final-screen');
  fs.style.display='flex';
  let medal,title,sub;
  if(score===total){medal='🏆';title='Perfeito!';sub='Nota 10! Você dominou a Era da Catástrofe!';}
  else if(score>=total*.9){medal='🥇';title='Medalha de Ouro!';sub='Excelente! Quase perfeito!';}
  else if(score>=total*.7){medal='🥈';title='Medalha de Prata!';sub='Muito bem! Continue estudando!';}
  else if(score>=total*.5){medal='🥉';title='Medalha de Bronze!';sub='Bom esforço! Revise o material!';}
  else{medal='📚';title='Continue Estudando!';sub='Revise o resumo e tente novamente!';}
  document.getElementById('final-medal').textContent=medal;
  document.getElementById('final-title').textContent=title;
  document.getElementById('final-sub').textContent=sub;
  document.getElementById('stat-score').textContent=`${score}/${total}`;
  document.getElementById('stat-pct').textContent=`${pct}%`;
  document.getElementById('stat-streak').textContent=maxStreak;
  if(score>=total*.7)launchConfetti();
}

function restart(){
  current=0;answers=new Array(questions.length).fill(null);streak=0;maxStreak=0;score=0;
  document.getElementById('final-screen').style.display='none';
  document.getElementById('quiz-card').style.display='block';
  document.getElementById('progress-bar-wrap').style.display='block';
  stopConfetti();render();
}

let confettiAnim=null;
function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,
    r:Math.random()*8+4,d:Math.random()*3+1,
    color:['#ff4444','#ff9900','#ffff00','#ff66cc','#ffffff'][Math.floor(Math.random()*5)],
    tilt:Math.random()*10-5,tiltAngle:0,tiltSpeed:Math.random()*.05+.01
  }));
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath();ctx.ellipse(p.x,p.y,p.r,p.r/2,p.tilt,0,2*Math.PI);
      ctx.fillStyle=p.color;ctx.fill();
      p.y+=p.d;p.tiltAngle+=p.tiltSpeed;p.tilt=Math.sin(p.tiltAngle)*12;
      if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
    });
    confettiAnim=requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti(){
  if(confettiAnim)cancelAnimationFrame(confettiAnim);
  const c=document.getElementById('confetti-canvas');
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

render();
</script>
