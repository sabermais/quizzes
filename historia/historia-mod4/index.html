<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz P2 Historia Primeira Republica</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060610;--card:#0d0d2b;--cyan:#00e5ff;--green:#39ff14;--red:#ff3355;--yellow:#ffe600;--purple:#b44fff;--card2:#111130;--border:#1a1a4a}
body{background:var(--bg);color:#e0e0ff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 0 40px}
.quiz-header{width:100%;max-width:720px;border-radius:0 0 20px 20px;overflow:hidden;margin-bottom:24px;box-shadow:0 4px 32px rgba(0,229,255,.15)}
.header-logo{background:#0a0020;padding:0;margin:0;line-height:0;font-size:0}
.header-logo img{width:100%;height:auto;display:block;margin:0;padding:0;border:none;vertical-align:top}
.header-band{background:linear-gradient(135deg,#0a002a,#160050);padding:14px 24px 16px;text-align:center;border-top:2px solid var(--cyan)}
.header-band h1{font-size:1.3rem;color:var(--cyan);text-shadow:0 0 12px var(--cyan);letter-spacing:1px;font-weight:800}
.header-band p{color:#aaa;font-size:.82rem;margin-top:4px}
.progress-wrap{width:100%;max-width:720px;padding:0 16px;margin-bottom:16px}
.progress-bar-bg{background:#1a1a3a;border-radius:99px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:99px;transition:width .4s ease;box-shadow:0 0 8px var(--cyan)}
.progress-label{display:flex;justify-content:space-between;font-size:.75rem;color:#666;margin-top:4px}
.streak-badge{display:none;position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#ff6b00,#ffe600);color:#000;font-weight:900;font-size:.9rem;padding:8px 16px;border-radius:99px;z-index:999;animation:popIn .3s ease;box-shadow:0 0 20px #ff6b00}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.card{width:100%;max-width:720px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 28px 24px;box-shadow:0 0 30px rgba(0,229,255,.07);margin:0 16px}
.q-label{font-size:.72rem;color:var(--cyan);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;opacity:.8}
.q-text{font-size:1.05rem;line-height:1.65;color:#d0d0ff;margin-bottom:22px;font-weight:500}
.source-tag{display:inline-block;font-size:.68rem;padding:2px 10px;border-radius:99px;margin-bottom:12px;font-weight:700;letter-spacing:.5px}
.src-canva{background:rgba(0,229,255,.12);color:var(--cyan);border:1px solid rgba(0,229,255,.3)}
.src-git{background:rgba(57,255,20,.1);color:var(--green);border:1px solid rgba(57,255,20,.25)}
.options{display:flex;flex-direction:column;gap:10px}
.opt{background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:13px 18px;cursor:pointer;font-size:.95rem;color:#c0c0ee;transition:all .2s;display:flex;align-items:flex-start;gap:10px;text-align:left}
.opt:hover:not(.locked){border-color:var(--cyan);color:#fff;background:#161640;box-shadow:0 0 12px rgba(0,229,255,.15)}
.opt .opt-letter{font-weight:800;color:var(--cyan);min-width:22px;font-size:.9rem}
.opt.correct{border-color:var(--green)!important;background:rgba(57,255,20,.1)!important;color:#fff}
.opt.correct .opt-letter{color:var(--green)}
.opt.wrong{border-color:var(--red)!important;background:rgba(255,51,85,.1)!important;color:#fff}
.opt.wrong .opt-letter{color:var(--red)}
.opt.show-correct{border-color:var(--green)!important;background:rgba(57,255,20,.07)!important}
.opt.locked{cursor:default;pointer-events:none}
.feedback{margin-top:16px;padding:14px 18px;border-radius:12px;font-size:.9rem;line-height:1.55;display:none}
.feedback.correct{background:rgba(57,255,20,.1);border:1px solid rgba(57,255,20,.3);color:#b0ffb0}
.feedback.wrong{background:rgba(255,51,85,.1);border:1px solid rgba(255,51,85,.3);color:#ffb0b0}
.nav{display:flex;justify-content:space-between;margin-top:20px;gap:12px}
.btn{padding:11px 24px;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-back{background:transparent;border:1.5px solid #333;color:#666}
.btn-back:hover:not(:disabled){border-color:#555;color:#999}
.btn-back:disabled{opacity:.3;cursor:default}
.btn-next{background:linear-gradient(135deg,var(--cyan),var(--green));color:#000;box-shadow:0 0 16px rgba(0,229,255,.3)}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 0 24px rgba(0,229,255,.5)}
.btn-next:disabled{opacity:.3;cursor:default;transform:none}
.final{display:none;width:100%;max-width:720px;padding:0 16px;flex-direction:column;align-items:center;text-align:center}
.medal{font-size:5rem;margin-bottom:8px;filter:drop-shadow(0 0 20px gold)}
.final-title{font-size:2rem;font-weight:900;color:var(--cyan);text-shadow:0 0 20px var(--cyan);margin-bottom:4px}
.final-subtitle{color:#888;margin-bottom:24px;font-size:.9rem}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;margin-bottom:24px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-val{font-size:2rem;font-weight:900;color:var(--cyan)}
.stat-lbl{font-size:.7rem;color:#666;text-transform:uppercase;letter-spacing:1px}
.btn-restart{background:linear-gradient(135deg,var(--purple),var(--cyan));color:#fff;padding:14px 32px;font-size:1rem;font-weight:800;border-radius:12px;border:none;cursor:pointer;box-shadow:0 0 20px rgba(180,79,255,.4);margin-top:8px}
.btn-restart:hover{transform:translateY(-2px)}
canvas#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
@media(max-width:600px){.card{padding:20px 16px;margin:0 8px}.header-band h1{font-size:1.1rem}.stats-grid{grid-template-columns:1fr 1fr 1fr}.stat-val{font-size:1.4rem}}
</style>
</head>

const questions=[{"src": "canva", "text": "Durante a Primeira República, qual era a realidade dos trabalhadores urbanos nas grandes cidades brasileiras?", "options": ["Tinham acesso a direitos trabalhistas como férias e aposentadoria", "Enfrentavam jornadas de até 16 horas, salários baixos e nenhum direito trabalhista", "Trabalhavam apenas 8 horas diárias com condições adequadas", "Recebiam altos salários e moravam em boas condições", "Eram protegidos por leis trabalhistas criadas pelo governo"], "correct": 1, "feedback": "Os trabalhadores viviam em condições precárias: jornadas de 10 a 16 horas, salários miseráveis, sem férias, sem aposentadoria e sem qualquer direito trabalhista."}, {"src": "canva", "text": "Qual ideologia, trazida principalmente por imigrantes europeus, influenciou a organização dos trabalhadores no Brasil durante a Primeira República?", "options": ["Positivismo", "Liberalismo econômico", "Anarquismo e socialismo", "Monarquismo", "Fascismo"], "correct": 2, "feedback": "O anarquismo e o socialismo chegaram com os imigrantes europeus e foram fundamentais para organizar os primeiros sindicatos e a Greve Geral de 1917."}, {"src": "canva", "text": "A Greve Geral de 1917 teve início em qual cidade?", "options": ["Rio de Janeiro", "Belo Horizonte", "Salvador", "São Paulo", "Recife"], "correct": 3, "feedback": "A Greve Geral de 1917 começou em São Paulo, onde a industrialização era mais intensa e as condições de trabalho mais precárias."}, {"src": "canva", "text": "Qual foi o estopim para o início da Greve Geral de 1917?", "options": ["A aprovação de uma lei que proibia os sindicatos", "A morte de um operário durante os confrontos", "O aumento do custo de vida sem reajuste salarial", "A expulsão de trabalhadores imigrantes do país", "A invasão das fábricas pela polícia"], "correct": 1, "feedback": "A morte de um operário durante confrontos foi o estopim. O caldo já fervia: custo de vida alto, salários baixos e condições desumanas de trabalho."}, {"src": "canva", "text": "Quais eram as principais reivindicações dos trabalhadores na Greve Geral de 1917?", "options": ["Direito ao voto feminino e reforma agrária", "Independência política e criação de partidos", "Aumento salarial, redução da jornada, fim do trabalho infantil e diminuição do custo de vida", "Construção de escolas e hospitais públicos", "Fim da imigração europeia e proteção do emprego nacional"], "correct": 2, "feedback": "Os trabalhadores pediam: aumento de salário, redução da jornada, fim do trabalho infantil, melhores condições de moradia e redução do custo de vida."}, {"src": "canva", "text": "A Greve Geral de 1917 é considerada:", "options": ["O primeiro movimento abolicionista do Brasil", "A maior mobilização operária da Primeira República", "Uma revolta exclusivamente rural", "Um movimento liderado por militares", "Uma manifestação pacífica sem repressão"], "correct": 1, "feedback": "A Greve Geral de 1917 foi a maior mobilização operária da Primeira República — paralisou fábricas, comércios e serviços em São Paulo."}, {"src": "canva", "text": "O que aconteceu após a Greve Geral de 1917?", "options": ["Todos os direitos trabalhistas foram conquistados", "Houve algumas conquistas salariais, mas também dura repressão", "O governo atendeu a todas as reivindicações", "Os sindicatos foram oficialmente reconhecidos", "Nenhuma mudança ocorreu"], "correct": 1, "feedback": "O resultado foi misto: algumas melhorias salariais, mas também repressão intensa, com prisão e expulsão de lideranças anarquistas."}, {"src": "canva", "text": "O que era o 'cortiço' durante a Primeira República?", "options": ["Uma forma de organização sindical dos trabalhadores", "Moradia precária coletiva nas cidades, com péssimas condições sanitárias", "Um tipo de plantação no interior do país", "Uma instituição de ensino para pobres", "Um tipo de prisão para anarquistas"], "correct": 1, "feedback": "Os cortiços eram habitações coletivas superlotadas, sem saneamento básico, onde viviam os trabalhadores pobres. Eram focos de doenças e reflexo da exclusão social urbana da Primeira República."}, {"src": "canva", "text": "Qual foi o objetivo da Reforma Urbana liderada pelo prefeito Pereira Passos no Rio de Janeiro?", "options": ["Construir moradias populares para os pobres", "Modernizar e 'europeizar' o centro da cidade, removendo cortiços e populações pobres", "Ampliar o comércio popular e as feiras livres", "Criar áreas industriais no centro da cidade", "Desenvolver o transporte público para as classes populares"], "correct": 1, "feedback": "A Reforma Pereira Passos ('Bota-Abaixo') visava transformar o Rio em cidade 'europeia e civilizada', demolindo cortiços e expulsando os pobres para os morros — dando origem às favelas."}, {"src": "canva", "text": "Qual foi a principal consequência social da Reforma Urbana de Pereira Passos para a população pobre?", "options": ["A construção de novas moradias populares pelo governo", "A expulsão dos pobres para os morros e periferias, originando as favelas", "A melhora das condições de vida graças ao saneamento básico", "O aumento do emprego formal no setor da construção civil", "A integração dos pobres ao novo centro modernizado da cidade"], "correct": 1, "feedback": "A reforma expulsou os pobres do centro sem oferecer alternativas de moradia — eles foram para os morros, formando as primeiras favelas. A 'modernidade' era exclusivamente para as elites."}, {"src": "canva", "text": "Qual era a relação entre o custo de vida e os salários em 1917?", "options": ["Os salários cresceram mais rápido que o custo de vida", "O custo de vida subiu muito, enquanto os salários cresceram pouco, gerando perda do poder de compra", "O custo de vida e os salários cresceram na mesma proporção", "Os salários caíram enquanto o custo de vida também caía", "Apenas os imigrantes sofriam com a diferença entre salários e custo de vida"], "correct": 1, "feedback": "COBRE MUITO EM PROVA! O custo de vida disparou (a 1ª Guerra Mundial encareceu alimentos e produtos), enquanto os salários cresceram pouco — gerando perda enorme de poder de compra e alimentando a revolta de 1917."}, {"src": "canva", "text": "O que foi a Revolta da Vacina (1904)?", "options": ["Uma revolta de agricultores contra o imposto sobre as colheitas", "Uma revolta popular contra a vacinação obrigatória autoritária, as reformas urbanas e a expulsão dos pobres do centro do Rio", "Uma insurreição liderada por médicos contra o governo", "Uma rebelião de escravizados libertados que reivindicavam terras", "Uma greve de trabalhadores da saúde por melhores salários"], "correct": 1, "feedback": "A Revolta da Vacina (1904) não era só contra a vacina — era contra a forma autoritária da imposição: agentes invadiam casas à força. Somada à expulsão dos pobres do centro, gerou revolta popular intensa."}, {"src": "canva", "text": "Qual era o papel da 'imprensa negra' durante a Primeira República?", "options": ["Produzir jornais favoráveis ao governo republicano", "Publicar jornais e revistas criados por afrodescendentes para denunciar o racismo e organizar a resistência cultural e política", "Divulgar propagandas das fazendas de café para atrair imigrantes", "Produzir literatura religiosa para as comunidades de ex-escravizados", "Defender o retorno da monarquia para proteger os direitos dos negros"], "correct": 1, "feedback": "A imprensa negra foi uma forma de resistência: denunciava o racismo, valorizava a cultura afro-brasileira e organizava politicamente os afrodescendentes numa época em que eram completamente excluídos da República."}, {"src": "canva", "text": "A Guerra de Canudos ocorreu em qual período?", "options": ["1890-1895", "1896-1897", "1910-1915", "1920-1925", "1912-1916"], "correct": 1, "feedback": "A Guerra de Canudos ocorreu entre 1896 e 1897, no sertão da Bahia. O governo enviou quatro expedições militares até destruir o arraial e massacrar seus habitantes."}, {"src": "canva", "text": "Quem liderou o arraial de Canudos?", "options": ["Zumbi dos Palmares", "Lampião", "Antônio Conselheiro", "Beato Miguel", "Frei Caetano"], "correct": 2, "feedback": "Antônio Conselheiro liderou Canudos. Era um beato que pregava contra as reformas republicanas e atraiu milhares de sertanejos pobres que buscavam uma vida mais digna."}, {"src": "canva", "text": "Por que o governo republicano considerou Canudos uma ameaça?", "options": ["Porque Canudos produzia armas para derrubar o governo", "Porque os canudenses não pagavam impostos e não reconheciam a República", "Porque o arraial estava invadindo fazendas dos coronéis", "Porque Conselheiro era um agente da monarquia portuguesa", "Porque Canudos tinha aliança com nações estrangeiras"], "correct": 1, "feedback": "O governo via Canudos como ameaça à ordem republicana: os sertanejos não reconheciam a República, não pagavam impostos e viviam de forma autônoma. Isso foi interpretado como subversão e 'restauração da monarquia'."}, {"src": "canva", "text": "Qual foi o desfecho da Guerra de Canudos?", "options": ["Acordo de paz que garantiu autonomia ao arraial", "Destruição total do arraial e massacre de seus habitantes", "Vitória dos canudenses e formação de um estado independente", "Rendição pacífica liderada por Conselheiro", "Fuga dos sertanejos para o interior do Nordeste"], "correct": 1, "feedback": "Canudos foi completamente destruída na quarta expedição militar (1897). O massacre vitimou entre 15.000 e 25.000 pessoas — um dos maiores genocídios da história brasileira."}, {"src": "canva", "text": "O fenômeno do cangaço ocorreu principalmente em qual região do Brasil?", "options": ["Nordeste, especialmente no sertão", "Sul, na região dos pampas", "Centro-Oeste, no planalto", "Sudeste, no interior de São Paulo", "Norte, na Amazônia"], "correct": 0, "feedback": "O cangaço foi um fenômeno típico do sertão nordestino, região marcada por extrema seca, desigualdade social, concentração de terras nos coronéis e ausência do Estado."}, {"src": "canva", "text": "O cangaço surgiu em um contexto de:", "options": ["Abundância econômica e igualdade social", "Desigualdade social, concentração de terras e ausência do Estado", "Desenvolvimento industrial acelerado", "Paz política total", "Fortalecimento das instituições democráticas"], "correct": 1, "feedback": "O cangaço nasceu da miséria, da seca, da violência dos coronéis e da ausência de qualquer proteção estatal para os pobres do sertão."}, {"src": "canva", "text": "Por que o Cangaço é considerado por alguns estudiosos uma forma de 'banditismo social'?", "options": ["Porque os cangaceiros eram contratados pelo governo para combater os coronéis", "Porque era um movimento organizado com ideologia política clara", "Porque os cangaceiros atacavam as elites econômicas e eram vistos por parte da população como heróis que 'roubavam dos ricos para dar aos pobres'", "Porque nunca atacaram pessoas pobres, apenas fazendeiros ricos", "Porque tinham um partido político e um programa de governo"], "correct": 2, "feedback": "O 'banditismo social' (Hobsbawm) descreve grupos de explorados que usam a violência como resistência. Os cangaceiros atacavam coronéis e fazendeiros, e parte da população os via como heróis. Mas eles também vitimavam os pobres, daí a ambiguidade."}, {"src": "canva", "text": "Mesmo após a abolição da escravidão, os afrodescendentes enfrentavam principalmente:", "options": ["Falta de trabalho agrícola", "Ausência de direitos políticos formais", "Exclusão social, falta de acesso a condições dignas de trabalho e moradia", "Proibição legal de receber educação", "Impossibilidade legal de se deslocar"], "correct": 2, "feedback": "A abolição de 1888 não foi acompanhada de nenhuma política de integração. Os afrodescendentes continuaram excluídos: sem terra, sem emprego digno, sofrendo racismo e sendo empurrados para as periferias."}, {"src": "canva", "text": "O que foi a Revolta da Chibata (1910)?", "options": ["Uma revolta de trabalhadores rurais contra os coronéis", "Uma revolta de marinheiros contra os castigos físicos (chibatadas) na Marinha", "Uma revolução liderada por anarquistas contra o governo", "Uma greve de operários das ferrovias", "Uma rebelião de escravizados antes da abolição"], "correct": 1, "feedback": "A Revolta da Chibata (1910) foi liderada por João Cândido contra os castigos físicos praticados na Marinha brasileira, uma herança do tempo da escravidão."}, {"src": "canva", "text": "Quem foi João Cândido e qual foi seu papel na Revolta da Chibata?", "options": ["Um coronel do Exército que denunciou os abusos da Marinha", "O líder da revolta dos marinheiros, ficando conhecido como 'Almirante Negro'", "Um jornalista que publicou reportagens sobre os castigos físicos", "Um político que votou contra os castigos na Câmara dos Deputados", "O capitão do navio que ordenou o fim dos castigos físicos"], "correct": 1, "feedback": "João Cândido Felisberto, marinheiro negro de origem humilde, liderou a Revolta da Chibata em 1910. Ficou conhecido como o 'Almirante Negro' — símbolo de resistência negra e operária no Brasil republicano."}, {"src": "canva", "text": "Qual era a relação entre alguns cangaceiros e a população local?", "options": ["Hostilidade total", "Apoio da população local em alguns casos", "Indiferença mútua", "Conflito constante", "Relacionamento comercial apenas"], "correct": 1, "feedback": "Parte da população local apoiava os cangaceiros, os protegia e os via como heróis. Isso explica por que o cangaço durou décadas e foi tão difícil de ser eliminado."}, {"src": "canva", "text": "A Greve Geral de 1917 atingiu quais setores?", "options": ["Apenas as fábricas têxteis", "Fábricas, comércios e serviços", "Somente o setor agrícola", "Apenas os transportes públicos", "Somente as escolas"], "correct": 1, "feedback": "A Greve Geral de 1917 paralisou fábricas, comércios e serviços em São Paulo e outras cidades. Foi uma paralisação ampla que demonstrou o poder de organização dos trabalhadores urbanos."}, {"src": "git", "label": "Atividade 1a", "text": "O Teatro Municipal do Rio de Janeiro foi construído durante a reforma urbana de Pereira Passos. O pano de boca encomendado ao artista Eliseu Visconti gerou polêmica. O que as críticas revelavam sobre os ideais da elite republicana?", "options": ["A elite aprovava qualquer representação de negros e da monarquia, pois valorizava a pluralidade cultural", "A elite republicana não queria expor seu passado escravista nem o passado monárquico recente, preferindo uma identidade europeia e 'civilizada'", "A elite defendia que obras de arte deveriam retratar exclusivamente cenas religiosas", "A polêmica era apenas sobre o estilo artístico de Visconti, sem relação com questões políticas", "A elite queria que a arte retratasse apenas o progresso industrial do Brasil"], "correct": 1, "feedback": "A elite republicana queria apagar o passado escravista (representado pelos negros) e o passado monárquico, construindo uma imagem 'moderna e europeia' do Brasil republicano."}, {"src": "git", "label": "Atividade 1b", "text": "Um jornal da época publicou a manchete 'Luxo e miséria' durante a inauguração da Avenida Central (1905). Qual periódico publicou essa manchete e por quê?", "options": ["O Jornal do Comércio, pois representava os interesses das classes populares", "O Correio da Manhã, pois denunciava o contraste entre o luxo das obras e a miséria das famílias expulsas", "Ambos os jornais publicaram a mesma manchete com interpretações opostas", "Nenhum dos dois — a manchete pertencia a um terceiro jornal", "A Gazeta de Notícias, que apoiava as reformas mas reconhecia seus custos sociais"], "correct": 1, "feedback": "O Correio da Manhã publicou 'Luxo e miséria' porque denunciava o contraste: enquanto as elites festejavam, famílias pobres eram jogadas na rua pelas demolições."}, {"src": "git", "label": "Atividade 1c", "text": "Quais foram as consequências da reurbanização do Rio de Janeiro para os grupos sociais mais pobres?", "options": ["Os pobres foram beneficiados com novas moradias construídas pelo governo", "Os pobres foram expulsos para os morros e periferias, onde formaram as primeiras favelas, sem infraestrutura; além disso, os aluguéis subiram muito", "Os pobres aproveitaram o crescimento econômico e conseguiram empregos bem remunerados", "Os pobres foram para o interior, onde o governo distribuiu terras", "A reurbanização foi benéfica para todos — o saneamento reduziu as doenças também nas camadas populares"], "correct": 1, "feedback": "A reurbanização foi desastrosa para os pobres: perderam suas moradias, foram empurrados para os morros (origem das favelas) e os aluguéis dispararam."}, {"src": "git", "label": "Atividade 2a", "text": "A literatura de cordel retratou Antônio Conselheiro de formas opostas: o Texto I o vê como 'caso de polícia'; o Texto II como 'único fio de esperança dos pobres escorraçados'. Os dois cordelistas representam Conselheiro da mesma forma?", "options": ["Sim, ambos o retratam como líder religioso pacífico", "Não — o Texto I o vê como agitador perigoso; o Texto II o vê como guia e esperança dos pobres e excluídos", "Sim, ambos criticam Conselheiro por ter levado os pobres a uma guerra perdida", "Não — o Texto I o vê como herói e o Texto II como criminoso", "Ambos foram escritos pela mesma perspectiva política"], "correct": 1, "feedback": "Os dois cordéis têm perspectivas opostas: o Texto I reproduz o discurso das autoridades (Conselheiro = anarquia). O Texto II reproduz a visão dos sertanejos (Conselheiro = esperança dos oprimidos)."}, {"src": "git", "label": "Atividade 3b", "text": "O cangaço atrai explicações simpáticas e contrárias ao fenômeno. Quais argumentos são utilizados em cada posição?", "options": ["A favor: os cangaceiros só atacavam o governo. Contra: eram imigrantes que perturbavam a ordem", "A favor: o cangaço era banditismo social, atacando elites opressoras. Contra: os cangaceiros agiam por interesse próprio e também vitimavam os pobres", "A favor: eram heróis religiosos que seguiam Conselheiro. Contra: roubavam apenas os pobres", "A favor: o cangaço foi patrocinado pelo governo. Contra: eram contrários à República", "A favor: era movimento político organizado. Contra: era apenas resposta à seca"], "correct": 1, "feedback": "Os que defendem o cangaço falam em 'banditismo social' — rebelião dos explorados contra as elites. Os que criticam apontam que os cangaceiros agiam por interesse próprio e também atacavam os pobres."}, {"src": "git", "label": "Atividade 4a — A Plebe", "text": "O jornal A Plebe (1919) afirmava que a burguesia usa o Estado para reprimir os trabalhadores. Que visão de sociedade esse trecho expressa?", "options": ["Uma visão positivista, que acredita que o Estado deve organizar a sociedade de forma científica e harmônica", "Uma visão anarquista ou socialista, que considera o Estado um instrumento de dominação da classe burguesa sobre os trabalhadores", "Uma visão liberal, que defende o Estado mínimo apenas para garantir a propriedade privada", "Uma visão monarquista, que acredita que o Estado republicano é ilegítimo", "Uma visão reformista, que quer melhorar o Estado por dentro, sem conflito de classes"], "correct": 1, "feedback": "O jornal A Plebe era anarquista. Para os anarquistas, o Estado é instrumento da burguesia para manter os trabalhadores subjugados. Por isso defendiam a abolição do Estado e a autogestão dos trabalhadores."}, {"src": "git", "label": "Teste 1 (FGV-SP)", "text": "Sobre as reformas urbanas do prefeito Pereira Passos no Rio de Janeiro, é correto afirmar que:", "options": ["O projeto foi submetido à consulta popular e aprovado por estreita maioria", "A reurbanização incluiu conjuntos habitacionais para a população de baixa renda", "A abertura das avenidas foi inspirada na modernização da cidade de Salvador", "O desalojamento da população pobre intensificou a ocupação dos morros e a formação das favelas cariocas", "A população pobre aplaudiu as medidas, inclusive as campanhas de vacinação obrigatórias"], "correct": 3, "feedback": "(FGV-SP) Gabarito D. A reforma expulsou os pobres dos cortiços sem oferecer alternativas de moradia — eles foram para os morros, dando origem às favelas. As demais afirmativas são falsas."}, {"src": "git", "label": "Em Casa 1a", "text": "Dois jornais noticiaram a inauguração da Avenida Central em 1905 de formas opostas: o Correio da Manhã criticou o desperdício; o Jornal do Comércio exaltou o progresso. Esses jornais noticiaram o mesmo evento da mesma forma?", "options": ["Sim, ambos celebraram a inauguração como símbolo do progresso", "Não — o Correio da Manhã criticou o desperdício e o sofrimento das famílias desabrigadas; o Jornal do Comércio exaltou a avenida como conquista do progresso, sem mencionar as vítimas", "Sim, ambos criticaram as obras por falta de planejamento", "Não — o Jornal do Comércio criticou a obra e o Correio da Manhã a defendeu", "Os dois jornais representavam a mesma classe social e tinham visões idênticas"], "correct": 1, "feedback": "Os dois jornais tinham perspectivas opostas: o Correio da Manhã representava a visão crítica das famílias expulsas; o Jornal do Comércio representava os interesses das elites comerciais que se beneficiavam da reforma."}, {"src": "git", "label": "Em Casa 3a", "text": "Gilberto Gil cantou: 'Um cangaceiro / Será sempre anjo e capeta, bandido e herói [...] / Lampião faz bem, Lampião dói.' Por que o Cangaço é considerado por alguns estudiosos uma forma de 'banditismo social'?", "options": ["Porque os cangaceiros eram contratados pelos governos para combater os coronéis", "Porque atuavam como movimento organizado com ideologia política clara, lutando por reforma agrária", "Porque eram grupos de explorados que atacavam as elites econômicas e os coronéis opressores, sendo vistos por parte da população como heróis que 'roubavam dos ricos para dar aos pobres'", "Porque nunca atacaram pessoas pobres, apenas fazendeiros ricos", "Porque o cangaço era financiado por intelectuais socialistas das cidades"], "correct": 2, "feedback": "O conceito de 'banditismo social' (Eric Hobsbawm) descreve grupos de explorados que usam a violência como resistência social. A letra de Gilberto Gil capta essa ambiguidade: 'anjo e capeta, bandido e herói'."}, {"src": "git", "label": "Revolta da Chibata", "text": "Quais foram as principais reivindicações dos marinheiros na Revolta da Chibata e como o governo respondeu?", "options": ["Pediam melhores salários e o governo atendeu plenamente", "Exigiam o fim dos castigos físicos (chibatadas), melhores condições e tratamento mais digno; o governo prometeu atender, mas depois não cumpriu e reprimiu o movimento", "Pediam direito ao voto e o governo os ignorou completamente", "Exigiam que negros pudessem ser oficiais da Marinha; o governo aceitou parcialmente", "Pediam fim do serviço militar obrigatório; o governo os expulsou da Marinha"], "correct": 1, "feedback": "Os marinheiros exigiam o fim das chibatadas — castigos físicos que datavam da escravidão. O governo prometeu atender, mas depois prendeu e reprimiu os participantes. João Cândido foi internado num manicômio."}, {"src": "git", "label": "Revolta da Vacina", "text": "De que forma a obrigatoriedade da vacinação levou a população do Rio de Janeiro a se revoltar?", "options": ["A vacina causou doenças graves, gerando revolta justificada", "A vacinação obrigatória foi imposta de forma autoritária, com agentes invadindo casas sem informação adequada, gerando medo, revolta e sensação de invasão da vida privada", "A vacina era cara e a população não podia pagar", "O governo usou a vacinação para identificar e prender lideranças populares", "A vacina foi recusada porque a população preferia tratamentos tradicionais"], "correct": 1, "feedback": "A Revolta da Vacina (1904) não era só contra a vacina — era contra a forma autoritária da imposição: agentes invadiam casas à força, sem explicações. Somada à expulsão dos pobres do centro, gerou revolta popular intensa."}, {"src": "git", "label": "Guerra do Contestado", "text": "Quais causas levaram à Guerra do Contestado e como ela impactou a população local?", "options": ["Foi uma guerra entre Brasil e Argentina pela posse de terras", "Foi causada por disputas territoriais entre PR e SC, expulsão de camponeses por empresas ferroviárias e pobreza extrema; resultou em mortes, deslocamento e destruição de comunidades", "Foi um conflito entre coronéis pela posse de fazendas de erva-mate", "Foi uma revolta religiosa sem causa econômica ou territorial", "Foi um conflito entre militares e civis pela instalação de uma base militar"], "correct": 1, "feedback": "O Contestado (1912-1916) foi causado pela disputa territorial entre Paraná e SC, pela expulsão de camponeses por empresas ferroviárias, pela pobreza extrema e pela liderança de monges beatos. O conflito vitimou milhares de pessoas."}, {"src": "git", "label": "Greve Geral 1917", "text": "Quais condições de trabalho motivaram a Greve Geral de 1917 e quais foram os principais resultados?", "options": ["A proibição de sindicatos; resultou na legalização das organizações operárias", "Longas jornadas, baixos salários, aumento do custo de vida e ausência de direitos; como resultado, houve paralisação geral, algumas melhorias nas condições e maior organização dos trabalhadores, apesar da repressão", "A proibição do trabalho de imigrantes; resultou em novas leis de imigração", "Questões políticas (direito ao voto); resultou na aprovação do voto feminino", "Foi uma greve espontânea sem reivindicações claras"], "correct": 1, "feedback": "A Greve Geral de 1917 foi motivada pelas péssimas condições: jornadas de 14-16h, salários baixíssimos, aumento do custo de vida (a WWI havia encarecido tudo) e zero direitos trabalhistas. Foi a maior mobilização operária da Primeira República."}, {"src": "git", "label": "República Excludente", "text": "Por que a Primeira República é considerada uma república excludente?", "options": ["Porque o voto era restrito aos militares e aos fazendeiros ricos", "Porque o poder político era controlado pelas oligarquias rurais, a maioria da população era analfabeta e não votava, e trabalhadores, pobres e negros eram excluídos das decisões e dos benefícios da modernização", "Porque a república proibia a participação de imigrantes na política", "Porque o sistema eleitoral excluía apenas as mulheres, sendo democrático para os homens", "Porque apenas os estados do Sul e Sudeste participavam das eleições"], "correct": 1, "feedback": "A Primeira República era 'república' só no nome para a maioria. O voto era restrito a homens alfabetizados, havia fraude eleitoral, o poder era dos coronéis, e os trabalhadores, afrodescendentes e pobres não tinham voz nem acesso aos benefícios da modernização."}, {"src": "git", "label": "Afrodescendentes na República", "text": "Qual era a situação dos afrodescendentes na Primeira República, após a abolição da escravidão em 1888?", "options": ["Foram integrados à sociedade com políticas de compensação e acesso à terra", "Continuaram em situação de pobreza extrema, sofrendo racismo e exclusão social; sua cultura foi perseguida (capoeira proibida, religiões reprimidas) e foram empurrados para as periferias das cidades", "Receberam terras do governo e tornaram-se pequenos proprietários rurais", "Foram contratados como trabalhadores com os mesmos direitos dos imigrantes europeus", "Migraram em massa para o exterior em busca de melhores condições de vida"], "correct": 1, "feedback": "A abolição não foi acompanhada de nenhuma política de integração. Os afrodescendentes continuaram marginalizados: sem terra, sem emprego digno, sofrendo racismo sistemático. A capoeira foi criminalizada, as religiões afro-brasileiras perseguidas."}, {"src": "git", "label": "Canudos — Ameaça", "text": "Por que o arraial de Canudos foi visto como ameaça pelo governo republicano e quais foram as consequências?", "options": ["Canudos ameaçava o governo porque tinha um exército poderoso com armas modernas", "Canudos foi visto como ameaça porque reunia sertanejos pobres que não reconheciam a autoridade da República; o governo destruiu o arraial e causou a morte de grande parte da população", "Canudos ameaçava porque seus habitantes contrabandeavam armas", "O governo temia Canudos porque poderia se tornar um estado autônomo com apoio estrangeiro", "Canudos era vista como ameaça apenas religiosa, sem nenhuma dimensão política"], "correct": 1, "feedback": "Canudos era vista como subversão à ordem republicana: não reconhecia leis, não pagava impostos e seguia um líder messiânico. O governo enviou quatro expedições militares. O resultado foi o massacre de 15.000 a 25.000 pessoas."}, {"src": "git", "label": "Ideologias Operárias", "text": "Qual a diferença entre o anarquismo e o socialismo na organização dos trabalhadores da Primeira República?", "options": ["Não havia diferença — os dois movimentos tinham exatamente as mesmas propostas", "O anarquismo era contra qualquer forma de Estado e defendia a autogestão; o socialismo defendia a tomada do poder do Estado pelos trabalhadores para transformar a sociedade", "O anarquismo defendia a monarquia; o socialismo era a favor da república", "O anarquismo era exclusivamente rural; o socialismo era exclusivamente urbano", "O anarquismo foi criado no Brasil; o socialismo veio da Europa com os imigrantes"], "correct": 1, "feedback": "O anarquismo rejeitava qualquer Estado e defendia a autogestão direta. O socialismo defendia a conquista do Estado pelos trabalhadores. Ambos influenciaram os sindicatos brasileiros, mas o anarquismo foi dominante na Primeira República."}, {"src": "git", "label": "Pegadinha — República", "text": "Qual das afirmativas abaixo sobre a Primeira República é uma PEGADINHA clássica de prova?", "options": ["A Revolta da Vacina foi contra a forma autoritária da vacinação e as reformas urbanas", "O cangaço tinha caráter social — cangaceiros atacavam as elites e eram vistos como heróis por parte da população", "'A República trouxe igualdade para todos os brasileiros' — FALSO! A república continuou profundamente desigual e excludente", "João Cândido liderou a Revolta da Chibata contra os castigos físicos na Marinha", "A Greve Geral de 1917 foi a maior mobilização operária da Primeira República"], "correct": 2, "feedback": "PEGADINHA! 'A República trouxe igualdade para todos' é FALSO. A Primeira República manteve a escravidão simbólica, excluiu mulheres e analfabetos do voto, reprimiu trabalhadores e privilegiou as oligarquias cafeeiras. Nunca caia nessa!"}, {"src": "git", "label": "Revolta da Vacina — Contexto", "text": "A Revolta da Vacina (1904) foi contra a vacina em si ou havia outras causas?", "options": ["Foi exclusivamente contra a vacina — a população tinha medo das agulhas", "Não era só contra a vacina: foi contra a forma autoritária da imposição, as reformas urbanas que expulsavam os pobres e o estilo de governo que não consultava a população", "Foi uma revolta planejada pelos anarquistas para derrubar o governo", "Foi uma revolta dos médicos contra o método científico adotado pelo governo", "A revolta foi motivada apenas pelo preço da vacina, inacessível para os pobres"], "correct": 1, "feedback": "A Revolta da Vacina tinha múltiplas causas: vacinação obrigatória autoritária, demolições que expulsavam os pobres do centro e sensação geral de que o governo só servia às elites. A vacina foi o estopim, não a única causa."}, {"src": "git", "label": "Canudos vs Contestado", "text": "Qual foi a diferença entre as causas da Guerra de Canudos (1896-97) e a Guerra do Contestado (1912-16)?", "options": ["Canudos foi uma revolta de fazendeiros; Contestado foi uma revolta de operários urbanos", "Canudos misturou religiosidade e revolta contra a República no sertão baiano; o Contestado misturou disputas territoriais e religiosas no sul do Brasil, com expulsão de camponeses por empresas ferroviárias", "Canudos foi causado pela seca; Contestado foi causado pela falta de trabalho nas cidades", "Canudos foi uma revolta republicana contra a monarquia; Contestado foi uma revolta monarquista contra a república", "Canudos e Contestado tinham exatamente as mesmas causas — apenas ocorreram em regiões diferentes"], "correct": 1, "feedback": "Canudos: sertão da Bahia, messianismo religioso e rejeição à República. Contestado: Sul do Brasil, disputas territoriais, líderes religiosos (monges) e expulsão de camponeses por empresas ferroviárias. Contextos diferentes, ambas formas de resistência popular."}];
let current=0,score=0,errors=0,streak=0,maxStreak=0;
let userAnswers=new Array(questions.length).fill(null);
let answered=new Array(questions.length).fill(false);
function render(){
  const q=questions[current];
  const stag=document.getElementById('sourceTag');
  stag.className='source-tag '+(q.src==='canva'?'src-canva':'src-git');
  stag.textContent=q.src==='canva'?'Quiz Historia':'Contrastes do Brasil Republicano';
  document.getElementById('qLabel').textContent='Questao '+(current+1)+' de '+questions.length+(q.label?' | '+q.label:'');
  document.getElementById('qText').textContent=q.text;
  const wrap=document.getElementById('optionsWrap');
  wrap.innerHTML='';
  const L=['A','B','C','D','E'];
  q.options.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='opt';
    btn.innerHTML='<span class="opt-letter">'+L[i]+')</span> '+opt;
    btn.onclick=()=>selectAnswer(i);
    if(answered[current]){
      btn.classList.add('locked');
      const ua=userAnswers[current];
      if(i===q.correct)btn.classList.add(ua===i?'correct':'show-correct');
      else if(i===ua)btn.classList.add('wrong');
    }
    wrap.appendChild(btn);
  });
  const fb=document.getElementById('feedback');
  if(answered[current]){
    fb.style.display='block';
    const ok=userAnswers[current]===q.correct;
    fb.className='feedback '+(ok?'correct':'wrong');
    fb.textContent=(ok?'Correto! ':'Incorreto! ')+q.feedback;
  }else{fb.style.display='none';}
  document.getElementById('btnBack').disabled=current===0;
  document.getElementById('btnNext').disabled=!answered[current];
  if(current===questions.length-1&&answered[current]){
    document.getElementById('btnNext').textContent='Ver Resultado';
    document.getElementById('btnNext').onclick=showFinal;
  }else{
    document.getElementById('btnNext').textContent='Proxima';
    document.getElementById('btnNext').onclick=goNext;
  }
  const pct=((current+1)/questions.length)*100;
  document.getElementById('progressFill').style.width=Math.max(2,pct)+'%';
  document.getElementById('progText').textContent=(current+1)+' / '+questions.length;
  document.getElementById('scoreText').textContent='acertos: '+score+' erros: '+errors;
}
function selectAnswer(idx){
  if(answered[current])return;
  const q=questions[current];
  userAnswers[current]=idx;answered[current]=true;
  if(idx===q.correct){score++;streak++;maxStreak=Math.max(maxStreak,streak);showStreak();}
  else{errors++;streak=0;hideStreak();}
  document.getElementById('scoreText').textContent='acertos: '+score+' erros: '+errors;
  render();
}
function showStreak(){
  const badge=document.getElementById('streakBadge');
  const msgs={2:'2 seguidas! 🔥',3:'Hat-trick! 🔥🔥',4:'Em chamas! 💥',5:'Imparavel! 🚀',7:'Lendario! 👑',10:'PERFEITO! 🏆'};
  const key=Object.keys(msgs).reverse().find(k=>streak>=k);
  if(key){badge.textContent=msgs[key];badge.style.display='block';}
}
function hideStreak(){document.getElementById('streakBadge').style.display='none';}
function goNext(){if(current<questions.length-1){current++;render();}}
function goBack(){if(current>0){current--;render();}}
function showFinal(){
  document.getElementById('questionCard').style.display='none';
  document.getElementById('progressFill').style.width='100%';
  const fin=document.getElementById('finalScreen');fin.style.display='flex';
  const pct=Math.round((score/questions.length)*100);
  const medals=[[100,'🏆','Perfeito! Nota 10!'],[90,'🥇','Medalha de Ouro!'],[70,'🥈','Medalha de Prata!'],[50,'🥉','Medalha de Bronze!'],[0,'📚','Continue Estudando!']];
  const [,medal,title]=medals.find(([min])=>pct>=min);
  document.getElementById('finalMedal').textContent=medal;
  document.getElementById('finalTitle').textContent=title;
  document.getElementById('finalSub').textContent=score+' acertos de '+questions.length+' questoes';
  document.getElementById('statPct').textContent=pct+'%';
  document.getElementById('statStreak').textContent=maxStreak+'🔥';
  document.getElementById('statErr').textContent=errors;
  if(pct>=70)launchConfetti();
}
function restart(){
  current=0;score=0;errors=0;streak=0;maxStreak=0;
  userAnswers=new Array(questions.length).fill(null);
  answered=new Array(questions.length).fill(false);
  document.getElementById('finalScreen').style.display='none';
  document.getElementById('questionCard').style.display='block';
  hideStreak();render();
}
function launchConfetti(){
  const canvas=document.getElementById('confetti');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const pieces=Array.from({length:160},()=>{return{x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*6+3,d:Math.random()*20+5,color:['#00e5ff','#39ff14','#ffe600','#ff3355','#b44fff','#fff'][Math.floor(Math.random()*6)],tilt:Math.random()*10-5,tiltAngle:0,tiltSpeed:Math.random()*.1+.05}});
  let angle=0,frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{p.tiltAngle+=p.tiltSpeed;p.y+=(Math.cos(angle+p.d)+1+p.r/2)*1.5;p.x+=Math.sin(angle);p.tilt=15*Math.sin(p.tiltAngle);if(p.y>canvas.height){p.y=-20;p.x=Math.random()*canvas.width;}ctx.beginPath();ctx.lineWidth=p.r;ctx.strokeStyle=p.color;ctx.moveTo(p.x+p.tilt+p.r/2,p.y);ctx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/2);ctx.stroke();});
    angle+=.01;frame++;
    if(frame<300)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}
render();
</script>
