<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEMPLATE — Quiz Saber Mais</title>
<!--
  TEMPLATE DO QUIZ — padrão Saber Mais (dark neon).
  Para gerar um quiz: copie este arquivo, troque APENAS:
    1) o título/série no cabeçalho (.tag e <h1>)
    2) o array QUESTIONS (as perguntas)
  NÃO reescreva o motor (render/choose/streak/final/confete) nem o CSS — já estão prontos.

  REGRAS DAS QUESTÕES (ver SKILL.md):
   - 5 alternativas por questão; campo `c` = índice da CORRETA no array `o` (0..4)
   - nível alternando entre médio e difícil; marque as difíceis com lvl:"AVANÇADA"
   - feedback (`fb`) explicativo, SEM citar a posição das alternativas
   - as alternativas são EMBARALHADAS em runtime: a correta cai em letras diferentes
     a cada questão e a cada tentativa (o acerto é checado pelo índice original via data-i)
  Entregar como index.html. Fontes do sistema, zero dependências externas.
-->
<style>
  :root{
    --bg:#060610; --card:#0E0E1F; --card2:#15152B;
    --accent:#3B82F6; --accent2:#7C5CFF;
    --ok:#00A86B; --err:#E53935;
    --txt:#EAEAF5; --muted:#9A9AB5; --border:#262642;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--sans); background:
      radial-gradient(900px 500px at 110% -5%, rgba(124,92,255,.18), transparent 60%),
      radial-gradient(800px 500px at -10% 0%, rgba(59,130,246,.16), transparent 55%), var(--bg);
    color:var(--txt); min-height:100vh; line-height:1.55; -webkit-font-smoothing:antialiased; padding:0 0 60px;}
  .wrap{max-width:720px; margin:0 auto; padding:20px 18px;}
  .progress-shell{position:sticky; top:0; z-index:20; background:rgba(6,6,16,.85); backdrop-filter:blur(8px); padding:12px 0 10px;}
  .progress-track{height:10px; background:#1B1B33; border-radius:999px; overflow:hidden; box-shadow:inset 0 0 0 1px var(--border);}
  .progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .4s cubic-bezier(.4,0,.2,1); box-shadow:0 0 12px rgba(124,92,255,.7);}
  .meta{display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:.9rem; color:var(--muted); font-weight:700;}
  .streak{display:flex; align-items:center; gap:6px; opacity:0; transform:scale(.6); transition:.3s; color:#FF8A3D;}
  .streak.show{opacity:1; transform:scale(1);}
  .streak.pop{animation:pop .4s;}
  @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.35);}100%{transform:scale(1);}}
  .head{text-align:center; padding:26px 10px 10px;}
  .head .tag{display:inline-block; font-size:.74rem; letter-spacing:.16em; text-transform:uppercase; font-weight:800; color:#fff; background:linear-gradient(90deg,var(--accent),var(--accent2)); padding:5px 14px; border-radius:999px; margin-bottom:14px;}
  .head h1{font-size:1.7rem; font-weight:900; letter-spacing:-.5px; line-height:1.15;}
  .head p{color:var(--muted); margin-top:8px; font-weight:600;}
  .card{background:linear-gradient(180deg,var(--card),var(--card2)); border:1px solid var(--border); border-radius:20px; padding:24px 22px; margin-top:18px; box-shadow:0 20px 50px -24px rgba(0,0,0,.8);}
  .qnum{font-size:.82rem; font-weight:800; color:var(--accent); letter-spacing:.04em; text-transform:uppercase;}
  .lvl{display:inline-block; background:rgba(229,57,53,.18); color:#FF6B68; border:1px solid rgba(229,57,53,.5); font-size:.64rem; padding:2px 9px; border-radius:999px; margin-left:7px; letter-spacing:.08em; vertical-align:middle;}
  .qtext{font-size:1.18rem; font-weight:800; margin:8px 0 18px; line-height:1.4;}
  .opt{display:flex; align-items:flex-start; gap:12px; width:100%; text-align:left; cursor:pointer; background:#10101F; border:1.5px solid var(--border); color:var(--txt); border-radius:14px; padding:14px 16px; margin:10px 0; font-size:1rem; font-weight:600; font-family:inherit; transition:.18s;}
  .opt:hover:not(:disabled){border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.15); transform:translateY(-1px);}
  .opt .letter{flex:none; width:28px; height:28px; border-radius:8px; background:#1E1E3A; color:var(--accent); display:grid; place-items:center; font-weight:900; font-size:.9rem; transition:.18s;}
  .opt .mark{margin-left:auto; font-size:1.1rem; opacity:0;}
  .opt.correct{background:rgba(0,168,107,.16); border-color:var(--ok);}
  .opt.correct .letter{background:var(--ok); color:#fff;} .opt.correct .mark{opacity:1;}
  .opt.wrong{background:rgba(229,57,53,.14); border-color:var(--err);}
  .opt.wrong .letter{background:var(--err); color:#fff;} .opt.wrong .mark{opacity:1;}
  .opt:disabled{cursor:default;}
  .fb{margin-top:16px; border-radius:14px; padding:16px 18px; font-size:.98rem; display:none; border-left:5px solid;}
  .fb.show{display:block; animation:fade .35s;}
  .fb.ok{background:rgba(0,168,107,.10); border-color:var(--ok);}
  .fb.no{background:rgba(229,57,53,.10); border-color:var(--err);}
  .fb .fbtitle{font-weight:900; margin-bottom:5px; display:flex; align-items:center; gap:7px;}
  .fb.ok .fbtitle{color:#3DDC97;} .fb.no .fbtitle{color:#FF6B68;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:none;}}
  .next{margin-top:18px; width:100%; padding:15px; border:0; border-radius:14px; cursor:pointer; font-family:inherit; font-size:1.05rem; font-weight:800; color:#fff; background:linear-gradient(90deg,var(--accent),var(--accent2)); box-shadow:0 10px 26px -10px rgba(124,92,255,.7); display:none; transition:.18s;}
  .next:hover{transform:translateY(-2px);} .next.show{display:block;}
  .final{text-align:center; padding:36px 22px;}
  .final .medal{font-size:5rem; animation:pop .6s;}
  .final h2{font-size:1.8rem; font-weight:900; margin:6px 0;}
  .final .score{font-size:1.1rem; color:var(--muted); font-weight:700;}
  .final .pct{font-size:3.2rem; font-weight:900; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin:10px 0;}
  .final .stats{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:18px 0 26px;}
  .final .stat{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 20px; min-width:120px;}
  .final .stat .big{font-size:1.6rem; font-weight:900;} .final .stat .lbl{font-size:.78rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.05em;}
  .restart{padding:14px 28px; border:0; border-radius:14px; cursor:pointer; font-family:inherit; font-size:1.05rem; font-weight:800; color:#fff; background:linear-gradient(90deg,var(--accent),var(--accent2)); box-shadow:0 10px 26px -10px rgba(124,92,255,.7);}
  .restart:hover{transform:translateY(-2px);}
  .confetti{position:fixed; top:-12px; width:10px; height:14px; z-index:50; pointer-events:none; border-radius:2px;}
  .hidden{display:none;}
  @media(max-width:480px){ .head h1{font-size:1.4rem;} .qtext{font-size:1.08rem;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="progress-shell">
    <div class="progress-track"><div class="progress-fill" id="pfill"></div></div>
    <div class="meta">
      <span id="counter"></span>
      <span class="streak" id="streak">🔥 <span id="streakn">0</span> seguidas</span>
    </div>
  </div>
  <div id="quiz">
    <div class="head">
      <span class="tag">Física • 9º ano</span>
      <h1>🌀 Fenômenos Periódicos</h1>
      <p id="intro"></p>
    </div>
    <div id="cardArea"></div>
  </div>
  <div id="finalScreen" class="final hidden"></div>
</div>

<script>
/* ===== TROCAR APENAS ESTE ARRAY =====
   Cada questão: q (enunciado, aceita HTML), o (5 alternativas), c (índice 0..4 da correta),
   fb (explicação, sem citar posição), lvl opcional ("AVANÇADA") para as difíceis. */
const QUESTIONS = [
 {q:"O que caracteriza um <b>fenômeno periódico</b>?",
  o:["Repete-se de forma idêntica em intervalos de tempo iguais","Acontece uma única vez, de modo intenso","Ocorre de forma totalmente aleatória ao longo do tempo","Só existe em movimentos que descrevem círculos","Acontece sempre mais rápido a cada repetição"],c:0,
  fb:"A marca de um fenômeno periódico é a repetição idêntica em intervalos iguais — o ciclo termina onde começou e leva sempre o mesmo tempo. Aleatoriedade, evento único ou mudança de ritmo descaracterizam a periodicidade."},

 {q:"Qual é a unidade de <b>período (T)</b> no Sistema Internacional?",
  o:["Segundo (s)","Hertz (Hz)","Rotações por minuto (rpm)","Metro (m)","Ciclo (adimensional)"],c:0,
  fb:"O período mede o tempo de um ciclo completo, então sua unidade no SI é o segundo. Hertz é unidade de frequência, metro é de distância e rpm é uma unidade de frequência fora do SI."},

 {q:"A <b>frequência (f)</b> de um fenômeno periódico representa:",lvl:"AVANÇADA",
  o:["Quantos ciclos acontecem por unidade de tempo, medida em hertz","O tempo necessário para um ciclo, medida em segundos","A distância máxima até a posição de equilíbrio","A força que mantém o corpo oscilando","A massa do corpo que oscila"],c:0,
  fb:"Frequência é a contagem de ciclos por unidade de tempo (f = n/Δt), medida em hertz. O tempo de um ciclo é o período; a distância máxima ao equilíbrio é a amplitude — conceitos diferentes."},

 {q:"Um ciclista dá <b>10 pedaladas em exatos 5 segundos</b>. Qual é a frequência?",lvl:"AVANÇADA",
  o:["2 Hz","0,5 Hz","5 Hz","50 Hz","15 Hz"],c:0,
  fb:"Usando f = n/Δt = 10/5 = 2 Hz, ou seja, duas pedaladas por segundo. O valor 0,5 corresponderia ao período (T = 1/f), não à frequência."},

 {q:"Qual relação liga corretamente período e frequência?",
  o:["f = 1/T","f = T","f = T²","f = T + 1","f = 2T"],c:0,
  fb:"Período e frequência são grandezas inversas: f = 1/T (e T = 1/f). Quanto maior o tempo de cada ciclo, menos ciclos cabem em um segundo."},

 {q:"Um sistema massa-mola oscila com frequência <b>f = 0,5 Hz</b>. Qual é o período T?",lvl:"AVANÇADA",
  o:["2 s","0,5 s","1 s","5 s","0,2 s"],c:0,
  fb:"Como T = 1/f = 1/0,5 = 2 s, cada vai-e-volta completo dura 2 segundos. Confundir com 0,5 s seria repetir o valor da frequência em vez de invertê-lo."},

 {q:"Para converter uma frequência de <b>rpm para hertz</b>, você deve:",
  o:["Dividir o valor por 60","Multiplicar o valor por 60","Dividir o valor por 1000","Multiplicar o valor por 1000","Somar 60 ao valor"],c:0,
  fb:"Como 1 rpm = 1 rotação a cada 60 s = 1/60 Hz, basta dividir o valor em rpm por 60 para obter hertz. O fator 1000 aparece só no aviso 'x1000' de alguns painéis, que é outra coisa."},

 {q:"Um toca-discos clássico gira a <b>30 rpm</b>. Em hertz, essa frequência vale:",lvl:"AVANÇADA",
  o:["0,5 Hz","30 Hz","60 Hz","1800 Hz","2 Hz"],c:0,
  fb:"Dividindo por 60: 30 ÷ 60 = 0,5 Hz, ou seja, meia volta por segundo. Os valores 1800 ou 30 vêm de multiplicar ou não converter, erros comuns de unidade."},

 {q:"O instrumento que mede a frequência de giro do motor (em rpm) é o:",
  o:["Tacômetro","Termômetro","Velocímetro","Barômetro","Cronômetro"],c:0,
  fb:"O tacômetro (conta-giros) indica a rotação do motor em rpm. O velocímetro mede velocidade do veículo, e os demais medem temperatura, pressão e tempo."},

 {q:"Em alguns painéis, o tacômetro marca <b>'3' com o aviso discreto 'x1000 rpm'</b>. A frequência real, em hertz, é:",lvl:"AVANÇADA",
  o:["50 Hz","3 Hz","30 Hz","300 Hz","3000 Hz"],c:0,
  fb:"Primeiro lê-se o valor real: 3 × 1000 = 3000 rpm. Depois converte-se: 3000 ÷ 60 = 50 Hz. Esquecer o 'x1000' ou não dividir por 60 leva aos demais valores."},

 {q:"O que é a <b>amplitude (A)</b> de uma oscilação?",
  o:["A distância máxima entre o extremo do movimento e a posição de equilíbrio","O tempo gasto para completar um ciclo","O número de ciclos por segundo","A massa do corpo que oscila","A força elástica da mola"],c:0,
  fb:"Amplitude é o afastamento máximo em relação ao equilíbrio (como a altura máxima de um balanço). Tempo de ciclo é período e ciclos por segundo é frequência."},

 {q:"O <b>Movimento Harmônico Simples (MHS)</b> é definido como:",lvl:"AVANÇADA",
  o:["Oscilação em torno de um equilíbrio sob ação de uma força do tipo elástica que sempre puxa o corpo de volta","Qualquer movimento em linha reta com velocidade constante","Movimento que acelera indefinidamente numa só direção","Movimento circular com raio crescente","Movimento sem nenhuma força atuando sobre o corpo"],c:0,
  fb:"No MHS uma força do tipo elástica restaura o corpo para o equilíbrio, gerando a oscilação (o massa-mola ideal é o exemplo clássico). Movimento retilíneo uniforme ou acelerado não são oscilações."},

 {q:"A origem histórica do termo <b>'harmônico'</b> está ligada a:",
  o:["Pitágoras, ao estudar cordas vibrantes e os sons que produziam","Galileu, ao observar lustres na catedral de Pisa","Huygens, ao construir o relógio de pêndulo","Hertz, ao estudar ondas eletromagnéticas","Newton, ao formular as leis do movimento"],c:0,
  fb:"Pitágoras percebeu, em cordas que vibravam, que certas frequências produziam sons harmônicos — daí o nome. Galileu, Huygens e Hertz contribuíram com pêndulos, relógios e ondas, em outros momentos."},

 {q:"No <b>sistema massa-mola ideal</b>, o bloco passa pela posição de equilíbrio com:",lvl:"AVANÇADA",
  o:["Velocidade máxima","Velocidade nula","Aceleração máxima e velocidade nula","A mola na compressão máxima","Energia cinética nula"],c:0,
  fb:"No equilíbrio a força elástica é nula, mas o bloco está no auge da velocidade — logo, energia cinética máxima. A velocidade nula e a compressão máxima ocorrem nos extremos, não no centro."},

 {q:"De acordo com o experimento do pêndulo, o <b>período de oscilação</b> depende essencialmente de:",
  o:["Comprimento do fio","Massa da chumbada","Amplitude do balanço","Cor da chumbada","Força com que se solta o pêndulo"],c:0,
  fb:"O fator que controla o período do pêndulo (em ângulos pequenos) é o comprimento do fio: mais comprido, mais lento. Massa e amplitude não alteram o período."},

 {q:"Se você soltar o mesmo pêndulo de uma <b>distância bem maior</b> (amplitude maior), mantendo ângulos pequenos, o período:",
  o:["Permanece praticamente o mesmo","Aumenta bastante","Diminui bastante","Fica zero","Dobra de valor"],c:0,
  fb:"Para ângulos pequenos, a amplitude não muda o período — balançar mais longe não deixa o pêndulo mais lento nem mais rápido. Essa é uma 'pegadinha' clássica de prova."},

 {q:"Trocar a chumbada de um pêndulo por outra <b>muito mais pesada</b> faz o período:",lvl:"AVANÇADA",
  o:["Continuar exatamente o mesmo","Aumentar proporcionalmente à massa","Diminuir pela metade","Aumentar ao quadrado","Ficar instantaneamente zero"],c:0,
  fb:"A massa não influencia o período do pêndulo simples — pesada ou leve, o ritmo é o mesmo. Quem altera o período é o comprimento do fio."},

 {q:"A regra de que <b>massa e amplitude não afetam</b> o período do pêndulo só é válida quando:",lvl:"AVANÇADA",
  o:["O ângulo de oscilação é pequeno (fio muito maior que a amplitude)","O ângulo de oscilação é muito grande","O pêndulo está no vácuo absoluto","A chumbada é feita de metal","O experimento é feito à noite"],c:0,
  fb:"A regra vale para ângulos pequenos, em que o fio é bem maior que a amplitude. Em balanços muito amplos (quase dando a volta), a relação deixa de ser exata."},

 {q:"Quem inventou, em <b>1656</b>, o primeiro relógio de pêndulo propriamente dito?",
  o:["Christiaan Huygens","Galileu Galilei","Isaac Newton","Heinrich Hertz","Pitágoras de Samos"],c:0,
  fb:"Huygens transformou a regularidade do pêndulo em um relógio em 1656. Galileu fez as observações iniciais do fenômeno, mas não construiu esse relógio."},

 {q:"No <b>relógio de quartzo</b>, a alta precisão vem do fato de que o cristal:",lvl:"AVANÇADA",
  o:["Vibra cerca de 32 768 vezes por segundo por piezeletricidade","Gira 60 vezes por minuto como uma engrenagem","Usa a oscilação de átomos de césio","Depende do escoamento constante de areia","Aumenta sua frequência com o tempo"],c:0,
  fb:"O quartzo comprimido vibra ~32 768 vezes por segundo (piezeletricidade), garantindo grande regularidade. A oscilação de átomos de césio é o princípio do relógio atômico, e a areia, o da ampulheta."},

 {q:"O <b>relógio atômico</b>, o mais preciso de todos, baseia seu ritmo na:",
  o:["Ressonância da oscilação de átomos (como o césio)","Queda livre de pesos metálicos","Dilatação térmica de um metal","Rotação da Terra em torno do Sol","Vibração de uma corda de violão"],c:0,
  fb:"O relógio atômico usa a ressonância de átomos como o césio, errando menos de 1 segundo em 200 milhões de anos. Os outros fenômenos não atingem essa estabilidade."},

 {q:"No <b>sistema massa-mola</b>, nos extremos da oscilação (bloco momentaneamente parado), a energia está concentrada como:",lvl:"AVANÇADA",
  o:["Energia potencial elástica","Energia cinética","Energia potencial gravitacional","Energia térmica","Nenhuma energia (zero total)"],c:0,
  fb:"Nos extremos o bloco para por um instante: a energia cinética é mínima e a energia está guardada na mola como potencial elástica. No centro ela vira cinética."},

 {q:"No <b>pêndulo</b>, ao passar pelo ponto mais baixo (posição de equilíbrio), a energia é predominantemente:",
  o:["Cinética, pois a velocidade é máxima ali","Potencial gravitacional, pois está no ponto mais alto","Potencial elástica, armazenada num fio","Térmica, gerada pelo atrito","Nula, pois o pêndulo está em repouso"],c:0,
  fb:"No ponto mais baixo a velocidade é máxima, logo a energia é principalmente cinética. A potencial gravitacional é máxima nos extremos (pontos mais altos do balanço), não no centro."},

 {q:"Sobre a energia mecânica total durante uma oscilação ideal (sem atrito), é correto afirmar que:",lvl:"AVANÇADA",
  o:["Ela se conserva, apenas trocando de forma entre potencial e cinética","Ela atinge o máximo quando a velocidade é máxima","Ela aumenta a cada ciclo","Ela é máxima apenas nos extremos","Ela desaparece na posição de equilíbrio"],c:0,
  fb:"A energia total se conserva o tempo todo; o que muda é a 'fantasia' — ora mais potencial, ora mais cinética. No equilíbrio, a cinética é máxima, mas o total permanece o mesmo."},
];
/* ===================================== */

let idx=0, score=0, streak=0, bestStreak=0, answered=false;
const cardArea=document.getElementById('cardArea');
const pfill=document.getElementById('pfill');
const counter=document.getElementById('counter');
const streakEl=document.getElementById('streak');
const streakN=document.getElementById('streakn');
document.getElementById('intro').textContent=`${QUESTIONS.length} questões • escolha a alternativa correta e veja a explicação`;

function shuffled(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function render(){
  answered=false;
  const item=QUESTIONS[idx];
  counter.textContent=`Questão ${idx+1} de ${QUESTIONS.length}`;
  pfill.style.width=`${(idx/QUESTIONS.length)*100}%`;
  const letters=['A','B','C','D','E'];
  const order=shuffled(item.o.map((_,i)=>i));   // embaralha as alternativas existentes
  const opts=order.map((orig,pos)=>`
    <button class="opt" data-i="${orig}" onclick="choose(${orig})">
      <span class="letter">${letters[pos]}</span>
      <span class="otext">${item.o[orig]}</span>
      <span class="mark"></span>
    </button>`).join('');
  cardArea.innerHTML=`
    <div class="card">
      <div class="qnum">Questão ${idx+1}${item.lvl?` <span class="lvl">🔴 ${item.lvl}</span>`:''}</div>
      <div class="qtext">${item.q}</div>
      <div id="opts">${opts}</div>
      <div class="fb" id="fb"></div>
      <button class="next" id="next" onclick="nextQ()">${idx===QUESTIONS.length-1?'Ver resultado 🏁':'Próxima →'}</button>
    </div>`;
}

function choose(i){
  if(answered) return; answered=true;
  const item=QUESTIONS[idx];
  document.querySelectorAll('.opt').forEach(b=>{
    const bi=+b.dataset.i; b.disabled=true;
    if(bi===item.c){ b.classList.add('correct'); b.querySelector('.mark').textContent='✅'; }
    if(bi===i && i!==item.c){ b.classList.add('wrong'); b.querySelector('.mark').textContent='❌'; }
  });
  const fb=document.getElementById('fb');
  if(i===item.c){
    score++; streak++; bestStreak=Math.max(bestStreak,streak);
    fb.className='fb ok show'; fb.innerHTML=`<div class="fbtitle">✅ Acertou!</div>${item.fb}`;
  } else {
    streak=0;
    fb.className='fb no show'; fb.innerHTML=`<div class="fbtitle">❌ Não foi dessa vez</div>${item.fb}`;
  }
  updateStreak();
  document.getElementById('next').classList.add('show');
}

function updateStreak(){
  if(streak>=2){ streakN.textContent=streak; streakEl.classList.add('show');
    streakEl.classList.remove('pop'); void streakEl.offsetWidth; streakEl.classList.add('pop'); }
  else streakEl.classList.remove('show');
}

function nextQ(){ idx++; if(idx>=QUESTIONS.length) showFinal(); else { render(); window.scrollTo({top:0,behavior:'smooth'}); } }

function showFinal(){
  pfill.style.width='100%'; counter.textContent='Concluído!'; streakEl.classList.remove('show');
  document.getElementById('quiz').classList.add('hidden');
  const fs=document.getElementById('finalScreen'); fs.classList.remove('hidden');
  const pct=Math.round((score/QUESTIONS.length)*100);
  let medal,msg;
  if(pct===100){medal='🏆';msg='Perfeito! Você dominou o capítulo!';}
  else if(pct>=80){medal='🥇';msg='Excelente! Você manda muito bem.';}
  else if(pct>=60){medal='🥈';msg='Bom trabalho! Já está afiado.';}
  else if(pct>=40){medal='🥉';msg='Tá no caminho — revise e tente de novo!';}
  else {medal='📚';msg='Bora revisar o resumo e voltar mais forte!';}
  fs.innerHTML=`
    <div class="medal">${medal}</div>
    <h2>${msg}</h2>
    <div class="pct">${pct}%</div>
    <div class="score">Você acertou ${score} de ${QUESTIONS.length} questões</div>
    <div class="stats">
      <div class="stat"><div class="big">${score}/${QUESTIONS.length}</div><div class="lbl">Acertos</div></div>
      <div class="stat"><div class="big">🔥 ${bestStreak}</div><div class="lbl">Maior sequência</div></div>
      <div class="stat"><div class="big">${pct}%</div><div class="lbl">Aproveitamento</div></div>
    </div>
    <button class="restart" onclick="restart()">🔄 Refazer o quiz</button>`;
  window.scrollTo({top:0,behavior:'smooth'});
  if(pct>=70) confetti();
}

function restart(){
  idx=0; score=0; streak=0; bestStreak=0;
  document.getElementById('finalScreen').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function confetti(){
  const colors=['#3B82F6','#7C5CFF','#00A86B','#FF8A3D','#E53935','#FFD93D'];
  for(let i=0;i<120;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw'; c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    const dur=2.5+Math.random()*2, delay=Math.random()*1.5;
    c.style.animation=`fall ${dur}s ${delay}s linear forwards`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),(dur+delay)*1000+200);
  }
}
const _s=document.createElement('style');
_s.textContent=`@keyframes fall{to{transform:translateY(105vh) rotate(720deg); opacity:.2;}}`;
document.head.appendChild(_s);

render();
</script>
</body>
</html>
