<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz · Forças: Contato, Atrito e Resultante</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--cyan:#00e5ff;--green:#39ff14;--bg:#05070d;--card:#0e1320;--line:#1d2740;--txt:#e8eefc;--dim:#8a97b5;--red:#ff4d6d;--yellow:#ffd23f}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:radial-gradient(1200px 600px at 50% -10%,#0b1830 0%,var(--bg) 60%);color:var(--txt);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px}
.wrap{width:100%;max-width:680px}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.progress{flex:1;height:10px;background:#121a2e;border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:99px;transition:width .4s ease}
.counter{font-size:13px;color:var(--dim);white-space:nowrap;font-weight:600}
.streak{position:fixed;top:12px;right:12px;background:linear-gradient(135deg,#ff8a00,#ff2d55);color:#fff;font-weight:800;padding:8px 14px;border-radius:99px;font-size:14px;box-shadow:0 6px 22px rgba(255,80,40,.45);opacity:0;transform:translateY(-16px) scale(.8);transition:.35s;z-index:50;pointer-events:none}
.streak.show{opacity:1;transform:translateY(0) scale(1)}
.card{background:linear-gradient(180deg,var(--card),#0a0f1a);border:1px solid var(--line);border-radius:20px;padding:22px;box-shadow:0 18px 50px rgba(0,0,0,.5)}
.label{display:inline-block;font-size:12px;font-weight:800;letter-spacing:.5px;color:#05070d;background:linear-gradient(90deg,var(--cyan),var(--green));padding:5px 12px;border-radius:99px;margin-bottom:14px;text-transform:uppercase}
.qimg{width:100%;border-radius:14px;margin:4px 0 16px;background:#fff;display:block;border:1px solid var(--line)}
.qtext{font-size:18px;line-height:1.5;margin-bottom:18px}
.qtext b{color:var(--cyan)} .qtext i{color:var(--green)}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:center;gap:12px;background:#121a2e;border:1.5px solid var(--line);border-radius:13px;padding:14px 16px;cursor:pointer;font-size:16px;transition:.18s;text-align:left}
.opt:hover{border-color:var(--cyan);transform:translateY(-1px)}
.opt .key{width:28px;height:28px;flex:none;border-radius:8px;background:#1d2740;display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--cyan);font-size:14px}
.opt.correct{border-color:var(--green);background:rgba(57,255,20,.12)}
.opt.correct .key{background:var(--green);color:#05070d}
.opt.wrong{border-color:var(--red);background:rgba(255,77,109,.12)}
.opt.wrong .key{background:var(--red);color:#fff}
.opt.disabled{cursor:default;pointer-events:none;opacity:.85}
.fb{margin-top:16px;border-radius:13px;padding:15px 16px;font-size:15px;line-height:1.55;display:none;border:1px solid}
.fb.ok{display:block;background:rgba(57,255,20,.08);border-color:rgba(57,255,20,.4)}
.fb.no{display:block;background:rgba(255,77,109,.08);border-color:rgba(255,77,109,.4)}
.fb .h{font-weight:800;margin-bottom:6px;font-size:15px}
.fb.ok .h{color:var(--green)} .fb.no .h{color:var(--red)}
.fb b{color:var(--cyan)}
.nav{display:flex;justify-content:space-between;gap:12px;margin-top:18px}
.btn{flex:1;padding:14px;border:none;border-radius:13px;font-size:16px;font-weight:800;cursor:pointer;transition:.18s}
.btn.back{background:#121a2e;color:var(--dim);border:1.5px solid var(--line)}
.btn.back:hover{color:var(--txt)}
.btn.next{background:linear-gradient(90deg,var(--cyan),var(--green));color:#05070d}
.btn.next:disabled{opacity:.35;cursor:not-allowed}
.btn:active{transform:scale(.97)}
/* final */
.final{text-align:center;padding:30px 22px}
.medal{font-size:80px;margin-bottom:8px;animation:pop .6s ease}
@keyframes pop{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.final h1{font-size:28px;margin-bottom:6px;background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;background-clip:text;color:transparent}
.final .sub{color:var(--dim);margin-bottom:22px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.stat{background:#121a2e;border:1px solid var(--line);border-radius:14px;padding:16px 20px;min-width:96px}
.stat .v{font-size:26px;font-weight:800;color:var(--cyan)}
.stat .l{font-size:12px;color:var(--dim);margin-top:3px}
canvas#cf{position:fixed;inset:0;pointer-events:none;z-index:100}
</style>
</head>

  <div id="app"></div>
</div>

const Q = [{"label": "Questão 1 · Força de contato", "img": null, "q": "No curling, a pista de gelo é tão escorregadia que não consegue impedir o escorregamento da pedra — apenas impede que ela penetre no gelo, aplicando uma força de contato <b>Ñ (normal)</b>. Qual é a direção e o sentido dessa força normal sobre a pedra?", "opts": ["Horizontal, no sentido do movimento da pedra", "Vertical, para cima (perpendicular à superfície)", "Vertical, para baixo", "Horizontal, contrária ao movimento"], "correct": 1, "exp": "A normal é <b>sempre perpendicular</b> à superfície de contato. Como o gelo é horizontal, a normal é vertical e aponta <b>para cima</b>, empurrando a pedra e impedindo que ela penetre no gelo.", "src": ""}, {"label": "Questão 2 · Atrito", "img": null, "q": "Ao riscar um fósforo, a cabeça tende a escorregar <b>para a esquerda</b> sobre a lixa. Por causa do atrito, esse movimento é dificultado. Qual a direção e o sentido do <b>vetor atrito</b> sobre a cabeça do fósforo?", "opts": ["Vertical, para cima", "Horizontal, para a esquerda (mesmo sentido do escorregamento)", "Horizontal, para a direita (contrário ao escorregamento)", "Vertical, para baixo"], "correct": 2, "exp": "O atrito <b>sempre se opõe</b> à tendência de escorregamento. Se o fósforo tende a escorregar para a esquerda, o atrito aponta para a <b>direita</b>, dificultando o movimento.", "src": ""}, {"label": "Questão 3 · Atrito", "img": null, "q": "Se o fósforo <b>não</b> fosse pressionado fortemente contra a lixa, esfregando-a com pouca intensidade, ainda haveria atrito? E o fósforo acenderia?", "opts": ["Não haveria atrito algum, por isso não acenderia", "Haveria atrito e o fósforo acenderia normalmente", "Haveria atrito (mais fraco), mas provavelmente não acenderia", "Não haveria atrito, mas mesmo assim acenderia"], "correct": 2, "exp": "Sempre que há contato com tendência de escorregamento <b>existe atrito</b>. Porém, quanto menor a força que pressiona as superfícies (a normal), menor o atrito. Com atrito fraco, o calor gerado seria insuficiente para atingir a temperatura de ignição — então provavelmente <b>não acenderia</b>.", "src": ""}, {"label": "Questão 4 · Normal × Atrito", "img": null, "q": "A força de contato tem duas componentes. Qual alternativa associa <b>corretamente</b> cada componente à sua característica?", "opts": ["Penetração → Atrito  |  Escorregamento → Normal", "Penetração → Normal  |  Escorregamento → Atrito", "Ambas as ações são feitas pela força Normal", "Ambas as ações são feitas pela força de Atrito"], "correct": 1, "exp": "A <b>Normal (Ñ)</b> é perpendicular à superfície e se opõe à <b>penetração</b>. O <b>Atrito (Â)</b> é paralelo à superfície e se opõe ao <b>escorregamento</b>. Juntas formam a força de contato.", "src": ""}, {"label": "Questão 5 · Cabo de guerra", "img": "cabo", "q": "Dois rapazes praticam cabo de guerra. Assinale a alternativa em que estão <b>melhor representadas</b> as componentes da força de contato (normal Ñ e atrito Â) em um dos pés do rapaz <b>à direita</b>.", "opts": ["Alternativa a", "Alternativa b", "Alternativa c", "Alternativa d", "Alternativa e"], "correct": 1, "exp": "A normal é sempre perpendicular ao chão → aponta <b>verticalmente para cima</b> (elimina c, d e e). A corda puxa o rapaz da direita em direção ao centro (para a esquerda), então ele tende a escorregar para a esquerda; o atrito se opõe e aponta <b>para a direita</b>. Logo: Ñ para cima e Â para a direita → <b>alternativa b</b>.", "src": "data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAAC const KEYS=['a','b','c','d','e'];
let cur=0, answers=new Array(Q.length).fill(null), streak=0, maxStreak=0;

function showStreak(){
  const el=document.getElementById('streak');
  if(streak<2){el.classList.remove('show');return;}
  let t='2 seguidas! 🔥';
  if(streak===3)t='Hat-trick! 🔥🔥';
  else if(streak>=4)t='Lendário! 💥';
  el.textContent=t;el.classList.add('show');
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1800);
}

function render(){
  if(cur>=Q.length){return renderFinal();}
  const q=Q[cur], ans=answers[cur];
  document.getElementById('bar').style.width=((cur)/Q.length*100)+'%';
  document.getElementById('counter').textContent=(cur+1)+' / '+Q.length;
  let opts=q.opts.map((o,i)=>{
    let cls='opt';
    if(ans!==null){cls+=' disabled';
      if(i===q.correct)cls+=' correct';
      else if(i===ans)cls+=' wrong';}
    return `<div class="${cls}" onclick="pick(${i})"><span class="key">${KEYS[i]}</span><span>${o}</span></div>`;
  }).join('');
  let fb='';
  if(ans!==null){
    const ok=ans===q.correct;
    fb=`<div class="fb ${ok?'ok':'no'}"><div class="h">${ok?'✅ Correto!':'❌ Não foi dessa vez'}</div>${q.exp}</div>`;
  }
  document.getElementById('app').innerHTML=`
    <div class="card">
      <span class="label">${q.label}</span>
      ${q.src?`<img class="qimg" src="${q.src}" alt="figura da questão">`:''}
      <div class="qtext">${q.q}</div>
      <div class="opts">${opts}</div>
      ${fb}
      <div class="nav">
        <button class="btn back" onclick="go(-1)" ${cur===0?'style=visibility:hidden':''}>← Voltar</button>
        <button class="btn next" onclick="go(1)" ${ans===null?'disabled':''}>${cur===Q.length-1?'Ver resultado 🏁':'Próxima →'}</button>
      </div>
    </div>`;
}

function pick(i){
  if(answers[cur]!==null)return;
  answers[cur]=i;
  if(i===Q[cur].correct){streak++;maxStreak=Math.max(maxStreak,streak);showStreak();}
  else{streak=0;document.getElementById('streak').classList.remove('show');}
  render();
}
function go(d){cur+=d;if(cur<0)cur=0;render();window.scrollTo(0,0);}

function renderFinal(){
  document.getElementById('bar').style.width='100%';
  document.getElementById('counter').textContent=Q.length+' / '+Q.length;
  const hits=answers.filter((a,i)=>a===Q[i].correct).length;
  const errs=Q.length-hits;
  const pct=Math.round(hits/Q.length*100);
  let medal,title;
  if(pct===100){medal='🏆';title='Perfeito!';}
  else if(pct>=90){medal='🥇';title='Medalha de Ouro!';}
  else if(pct>=70){medal='🥈';title='Medalha de Prata!';}
  else if(pct>=50){medal='🥉';title='Medalha de Bronze!';}
  else{medal='📚';title='Continue Estudando!';}
  document.getElementById('app').innerHTML=`
    <div class="card final">
      <div class="medal">${medal}</div>
      <h1>${title}</h1>
      <div class="sub">Você acertou ${hits} de ${Q.length} questões</div>
      <div class="stats">
        <div class="stat"><div class="v">${pct}%</div><div class="l">aproveitamento</div></div>
        <div class="stat"><div class="v">🔥 ${maxStreak}</div><div class="l">maior sequência</div></div>
        <div class="stat"><div class="v">${errs}</div><div class="l">erros</div></div>
      </div>
      <button class="btn next" style="max-width:240px;margin:0 auto" onclick="restart()">Jogar novamente ↺</button>
    </div>`;
  document.getElementById('streak').classList.remove('show');
  if(pct>=70)confetti();
}
function restart(){cur=0;answers=new Array(Q.length).fill(null);streak=0;maxStreak=0;render();window.scrollTo(0,0);}

// confetti
function confetti(){
  const c=document.getElementById('cf'),x=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const cols=['#00e5ff','#39ff14','#ffd23f','#ff4d6d','#ffffff'];
  let P=[];for(let i=0;i<160;i++)P.push({x:Math.random()*c.width,y:-20-Math.random()*c.height,r:4+Math.random()*6,c:cols[i%cols.length],vy:2+Math.random()*4,vx:-2+Math.random()*4,rot:Math.random()*6,vr:-.2+Math.random()*.4});
  let frames=0;
  (function loop(){
    x.clearRect(0,0,c.width,c.height);frames++;
    P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;x.save();x.translate(p.x,p.y);x.rotate(p.rot);x.fillStyle=p.c;x.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);x.restore();if(p.y>c.height+20){p.y=-20;p.x=Math.random()*c.width;}});
    if(frames<260)requestAnimationFrame(loop);else x.clearRect(0,0,c.width,c.height);
  })();
}
render();
</script>
