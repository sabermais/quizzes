<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — O Sistema Endócrino • Saber Mais</title>
<!--
  TEMPLATE DO QUIZ — padrão Saber Mais (dark neon).
  Para gerar um quiz: copie este arquivo, troque APENAS:
    1) o título/série no cabeçalho (.tag e <h1>)
    2) o array QUESTIONS (as perguntas)
  NÃO reescreva o motor (render/choose/streak/final/confete) nem o CSS — já estão prontos.

  REGRAS DAS QUESTÕES (ver SKILL.md):
   - 5 alternativas por questão; campo `c` = índice da CORRETA no array `o` (0..4)
   - nível alternando entre médio e difícil; marque as difíceis com lvl:"AVANÇADA"
   - feedback (`fb`) explicativo, SEM citar a posição das alternativas
   - as alternativas são EMBARALHADAS em runtime: a correta cai em letras diferentes
     a cada questão e a cada tentativa (o acerto é checado pelo índice original via data-i)
  Entregar como index.html. Fontes do sistema, zero dependências externas.
-->
<style>
  :root{
    --bg:#060610; --card:#0E0E1F; --card2:#15152B;
    --accent:#3B82F6; --accent2:#7C5CFF;
    --ok:#00A86B; --err:#E53935;
    --txt:#EAEAF5; --muted:#9A9AB5; --border:#262642;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:var(--sans); background:
      radial-gradient(900px 500px at 110% -5%, rgba(124,92,255,.18), transparent 60%),
      radial-gradient(800px 500px at -10% 0%, rgba(59,130,246,.16), transparent 55%), var(--bg);
    color:var(--txt); min-height:100vh; line-height:1.55; -webkit-font-smoothing:antialiased; padding:0 0 60px;}
  .wrap{max-width:720px; margin:0 auto; padding:20px 18px;}
  .progress-shell{position:sticky; top:0; z-index:20; background:rgba(6,6,16,.85); backdrop-filter:blur(8px); padding:12px 0 10px;}
  .progress-track{height:10px; background:#1B1B33; border-radius:999px; overflow:hidden; box-shadow:inset 0 0 0 1px var(--border);}
  .progress-fill{height:100%; width:0%; border-radius:999px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .4s cubic-bezier(.4,0,.2,1); box-shadow:0 0 12px rgba(124,92,255,.7);}
  .meta{display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:.9rem; color:var(--muted); font-weight:700;}
  .streak{display:flex; align-items:center; gap:6px; opacity:0; transform:scale(.6); transition:.3s; color:#FF8A3D;}
  .streak.show{opacity:1; transform:scale(1);}
  .streak.pop{animation:pop .4s;}
  @keyframes pop{0%{transform:scale(1);}50%{transform:scale(1.35);}100%{transform:scale(1);}}
  .head{text-align:center; padding:26px 10px 10px;}
  .head .tag{display:inline-block; font-size:.74rem; letter-spacing:.16em; text-transform:uppercase; font-weight:800; color:#fff; background:linear-gradient(90deg,var(--accent),var(--accent2)); padding:5px 14px; border-radius:999px; margin-bottom:14px;}
  .head h1{font-size:1.7rem; font-weight:900; letter-spacing:-.5px; line-height:1.15;}
  .head p{color:var(--muted); margin-top:8px; font-weight:600;}
  .card{background:linear-gradient(180deg,var(--card),var(--card2)); border:1px solid var(--border); border-radius:20px; padding:24px 22px; margin-top:18px; box-shadow:0 20px 50px -24px rgba(0,0,0,.8);}
  .qnum{font-size:.82rem; font-weight:800; color:var(--accent); letter-spacing:.04em; text-transform:uppercase;}
  .lvl{display:inline-block; background:rgba(229,57,53,.18); color:#FF6B68; border:1px solid rgba(229,57,53,.5); font-size:.64rem; padding:2px 9px; border-radius:999px; margin-left:7px; letter-spacing:.08em; vertical-align:middle;}
  .qtext{font-size:1.18rem; font-weight:800; margin:8px 0 18px; line-height:1.4;}
  .opt{display:flex; align-items:flex-start; gap:12px; width:100%; text-align:left; cursor:pointer; background:#10101F; border:1.5px solid var(--border); color:var(--txt); border-radius:14px; padding:14px 16px; margin:10px 0; font-size:1rem; font-weight:600; font-family:inherit; transition:.18s;}
  .opt:hover:not(:disabled){border-color:var(--accent); box-shadow:0 0 0 3px rgba(59,130,246,.15); transform:translateY(-1px);}
  .opt .letter{flex:none; width:28px; height:28px; border-radius:8px; background:#1E1E3A; color:var(--accent); display:grid; place-items:center; font-weight:900; font-size:.9rem; transition:.18s;}
  .opt .mark{margin-left:auto; font-size:1.1rem; opacity:0;}
  .opt.correct{background:rgba(0,168,107,.16); border-color:var(--ok);}
  .opt.correct .letter{background:var(--ok); color:#fff;} .opt.correct .mark{opacity:1;}
  .opt.wrong{background:rgba(229,57,53,.14); border-color:var(--err);}
  .opt.wrong .letter{background:var(--err); color:#fff;} .opt.wrong .mark{opacity:1;}
  .opt:disabled{cursor:default;}
  .fb{margin-top:16px; border-radius:14px; padding:16px 18px; font-size:.98rem; display:none; border-left:5px solid;}
  .fb.show{display:block; animation:fade .35s;}
  .fb.ok{background:rgba(0,168,107,.10); border-color:var(--ok);}
  .fb.no{background:rgba(229,57,53,.10); border-color:var(--err);}
  .fb .fbtitle{font-weight:900; margin-bottom:5px; display:flex; align-items:center; gap:7px;}
  .fb.ok .fbtitle{color:#3DDC97;} .fb.no .fbtitle{color:#FF6B68;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:none;}}
  .next{margin-top:18px; width:100%; padding:15px; border:0; border-radius:14px; cursor:pointer; font-family:inherit; font-size:1.05rem; font-weight:800; color:#fff; background:linear-gradient(90deg,var(--accent),var(--accent2)); box-shadow:0 10px 26px -10px rgba(124,92,255,.7); display:none; transition:.18s;}
  .next:hover{transform:translateY(-2px);} .next.show{display:block;}
  .final{text-align:center; padding:36px 22px;}
  .final .medal{font-size:5rem; animation:pop .6s;}
  .final h2{font-size:1.8rem; font-weight:900; margin:6px 0;}
  .final .score{font-size:1.1rem; color:var(--muted); font-weight:700;}
  .final .pct{font-size:3.2rem; font-weight:900; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; margin:10px 0;}
  .final .stats{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:18px 0 26px;}
  .final .stat{background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 20px; min-width:120px;}
  .final .stat .big{font-size:1.6rem; font-weight:900;} .final .stat .lbl{font-size:.78rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.05em;}
  .restart{padding:14px 28px; border:0; border-radius:14px; cursor:pointer; font-family:inherit; font-size:1.05rem; font-weight:800; color:#fff; background:linear-gradient(90deg,var(--accent),var(--accent2)); box-shadow:0 10px 26px -10px rgba(124,92,255,.7);}
  .restart:hover{transform:translateY(-2px);}
  .confetti{position:fixed; top:-12px; width:10px; height:14px; z-index:50; pointer-events:none; border-radius:2px;}
  .hidden{display:none;}
  @media(max-width:480px){ .head h1{font-size:1.4rem;} .qtext{font-size:1.08rem;} }
</style>
</head>
<body>
<div class="wrap">
  <div class="progress-shell">
    <div class="progress-track"><div class="progress-fill" id="pfill"></div></div>
    <div class="meta">
      <span id="counter"></span>
      <span class="streak" id="streak">🔥 <span id="streakn">0</span> seguidas</span>
    </div>
  </div>
  <div id="quiz">
    <div class="head">
      <!-- TROCAR: matéria/série e título do capítulo -->
      <span class="tag">Ciências • 9º ano</span>
      <h1>🧬 O Sistema Endócrino</h1>
      <p id="intro"></p>
    </div>
    <div id="cardArea"></div>
  </div>
  <div id="finalScreen" class="final hidden"></div>
</div>

<script>
/* ===== TROCAR APENAS ESTE ARRAY =====
   Cada questão: q (enunciado, aceita HTML), o (5 alternativas), c (índice 0..4 da correta),
   fb (explicação, sem citar posição), lvl opcional ("AVANÇADA") para as difíceis. */
const QUESTIONS = [
 {q:"As glândulas que lançam seus produtos diretamente na corrente sanguínea, sem ducto, e por isso são muito irrigadas por capilares, são chamadas de:",
  o:["Glândulas endócrinas", "Glândulas exócrinas", "Glândulas sebáceas", "Glândulas sudoríparas", "Glândulas salivares"],c:0,
  fb:"Glândulas endócrinas não têm ducto e liberam hormônios direto no sangue (ex.: tireoide, hipófise). As exócrinas (sebáceas, sudoríparas, salivares) usam um ducto para lançar o produto na pele ou em cavidades."},
 {q:"Qual é a diferença correta entre secreção e excreção?",
  o:["Secreção elimina substância útil ao corpo; excreção elimina um resíduo prejudicial do metabolismo", "Secreção elimina resíduos; excreção produz hormônios úteis", "Ambas eliminam apenas substâncias inúteis", "Secreção ocorre só nos rins e excreção só na pele", "Não há diferença: são sinônimos"],c:0,
  fb:"Secreção é a liberação de algo útil (saliva, hormônios). Excreção elimina um resíduo prejudicial do metabolismo, como a ureia, que sai na urina. Não são sinônimos."},
 {q:"O pâncreas é classificado como glândula mista porque:",
  o:["Produz suco pancreático (função exócrina) e também hormônios lançados no sangue (função endócrina)", "Produz apenas insulina e glucagon", "Fica localizado entre dois órgãos diferentes", "Funciona ora como glândula, ora como músculo", "Mistura sangue e enzimas no mesmo ducto"],c:0,
  fb:"A glândula mista faz as duas funções: o pâncreas libera suco pancreático no intestino (exócrina) e hormônios como insulina e glucagon no sangue (endócrina)."},
 {q:"Os hormônios circulam por todo o corpo, mas só atuam em certas células. As células que reconhecem e respondem a um hormônio específico são as:",
  o:["Células-alvo", "Células-tronco", "Células beta", "Células secretoras de muco", "Células epiteliais comuns"],c:0,
  fb:"Só as células-alvo possuem os receptores capazes de reconhecer aquele hormônio e responder a ele; as demais ignoram a mensagem mesmo recebendo o hormônio pelo sangue."},
 {q:"O conceito de homeostase corresponde a:",
  o:["Tendência do organismo de manter o meio interno em equilíbrio dinâmico", "Produção de hormônios apenas durante o sono", "Eliminação de resíduos exclusivamente pela urina", "Aumento constante e ilimitado do metabolismo", "Incapacidade do corpo de reagir ao ambiente"],c:0,
  fb:"Homeostase é a manutenção do meio interno em equilíbrio dinâmico, dentro de uma faixa de variação, independentemente das mudanças do ambiente externo."},
 {q:"A hipófise é chamada de glândula-mestra principalmente porque:", lvl:"AVANÇADA",
  o:["Produz hormônios tróficos que comandam a liberação de hormônios por outras glândulas", "É a maior glândula do corpo humano", "Produz sozinha todos os hormônios do organismo", "Fica exatamente no centro do cérebro", "Substitui as demais glândulas quando elas falham"],c:0,
  fb:"A maioria dos hormônios hipofisários é trófica: agem sobre outras glândulas, estimulando-as a liberar seus próprios hormônios. Por comandar tantas glândulas, a hipófise é a glândula-mestra."},
 {q:"Sobre o ADH e a ocitocina, é correto afirmar que:", lvl:"AVANÇADA",
  o:["São produzidos no hipotálamo e apenas armazenados e liberados pela neuroipófise", "São produzidos pela adenoipófise", "São produzidos pela glândula tireoide", "São produzidos diretamente pelos rins", "São produzidos pelas glândulas suprarrenais"],c:0,
  fb:"Embora liberados pela neuroipófise (hipófise posterior), o ADH e a ocitocina são fabricados no hipotálamo — a neuroipófise apenas os armazena e os libera."},
 {q:"Quando a taxa de cálcio no sangue está BAIXA, qual mecanismo o corpo aciona?",
  o:["As paratireoides liberam paratormônio, que retira cálcio dos ossos e eleva o nível no sangue", "A tireoide libera calcitonina, que deposita cálcio nos ossos", "O pâncreas libera insulina para captar o cálcio", "A hipófise libera ADH para reter o cálcio", "As suprarrenais liberam adrenalina para repor o cálcio"],c:0,
  fb:"Cálcio baixo: as paratireoides liberam paratormônio, que tira cálcio dos ossos e devolve ao sangue. A calcitonina faria o oposto, baixando o cálcio do sangue."},
 {q:"A calcitonina, hormônio que reduz o cálcio no sangue depositando-o nos ossos, é produzida pela:", lvl:"AVANÇADA",
  o:["Tireoide", "Paratireoides", "Hipófise", "Suprarrenal", "Pâncreas"],c:0,
  fb:"Apesar de o nome lembrar 'cálcio' (também regulado pelas paratireoides), a calcitonina é produzida pela tireoide. O paratormônio é que vem das paratireoides."},
 {q:"Logo após uma refeição rica em carboidratos a glicemia sobe. Para reduzi-la, o pâncreas libera:",
  o:["Insulina, pelas células beta, fazendo o fígado armazenar glicose como glicogênio", "Glucagon, pelas células alfa, quebrando o glicogênio", "Adrenalina, elevando ainda mais a glicose", "Paratormônio, retirando glicose dos ossos", "Calcitonina, depositando glicose no fígado"],c:0,
  fb:"Glicose alta: as células beta liberam insulina, e o fígado e os músculos absorvem a glicose e a guardam como glicogênio, baixando a glicemia. O glucagon faz o contrário."},
 {q:"O glucagon evita a hipoglicemia (queda do açúcar no sangue). O mecanismo pelo qual ele eleva a glicemia é:", lvl:"AVANÇADA",
  o:["A transformação do glicogênio em glicose e sua liberação na corrente sanguínea", "A transformação da glicose em glicogênio para armazenamento no fígado", "O aumento do uso de glicose pelas células para gerar energia", "O transporte de aminoácidos para dentro das células", "A conversão de aminoácidos em proteínas no fígado"],c:0,
  fb:"O glucagon estimula o fígado a quebrar o glicogênio armazenado, transformando-o em glicose e lançando-a no sangue — o que eleva a glicemia. As demais opções abaixariam ou não alterariam a glicose."},
 {q:"O mecanismo de equilíbrio dinâmico em que o corpo monitora, avalia e ajusta continuamente suas condições é chamado de:",
  o:["Retroalimentação (feedback)", "Excreção", "Secreção", "Digestão", "Respiração celular"],c:0,
  fb:"A retroalimentação (feedback) é o ciclo que monitora e corrige as condições do corpo (temperatura, glicose, cálcio, água) para manter a homeostase."},
 {q:"Ao sentirmos frio, qual é a sequência correta de eventos para o corpo gerar calor?", lvl:"AVANÇADA",
  o:["Sistema nervoso → liberação de TSH → tireoide libera T3 e T4 → aumento do metabolismo e do calor", "Tireoide → adrenalina → resfriamento do corpo", "Pâncreas → insulina → queima de glicogênio", "Paratireoides → paratormônio → contração muscular", "Hipófise → ADH → retenção de calor pela urina"],c:0,
  fb:"O frio aciona o sistema nervoso, que estimula a liberação de TSH. O TSH age na tireoide, que libera T3 e T4, acelerando o metabolismo e gerando calor (os tremores também ajudam)."},
 {q:"Quando os hormônios T3 e T4 atingem níveis altos, ocorre a inibição da produção de TSH. Qual a importância desse mecanismo?", lvl:"AVANÇADA",
  o:["Impede que o metabolismo continue subindo e a temperatura ultrapasse os níveis adequados", "Faz a temperatura corporal cair abaixo de zero", "Aumenta indefinidamente a produção de calor", "Bloqueia a tireoide para sempre", "Converte T3 e T4 em insulina"],c:0,
  fb:"É uma retroalimentação: T3 e T4 altos 'desligam' a liberação de TSH, evitando que o metabolismo e a temperatura subam demais. Assim o corpo se mantém por volta de 36,5 °C."},
 {q:"Sobre os tipos de diabetes mellitus, é correto afirmar que:",
  o:["No tipo 1 o corpo não produz insulina (ou produz pouca); no tipo 2 há diminuição dos receptores de insulina nas células", "No tipo 1 sobram receptores de insulina e no tipo 2 falta o pâncreas", "Os dois tipos são causados pela falta de ADH", "O tipo 2 é mais comum em crianças e o tipo 1 em idosos", "Nenhum dos tipos apresenta glicose elevada no sangue"],c:0,
  fb:"No tipo 1 a produção de insulina é insuficiente (redução das células beta). No tipo 2, mais ligado a hábitos e idade, há diminuição dos receptores de insulina, reduzindo a absorção de glicose."},
 {q:"O diabetes insipidus se diferencia do diabetes mellitus porque:", lvl:"AVANÇADA",
  o:["Não apresenta glicose na urina e é causado por falha na produção de ADH pela hipófise", "Apresenta excesso de insulina no sangue", "É causado pela falta de calcitonina", "Provoca queda da produção de urina", "Tem como causa o excesso de glicogênio no fígado"],c:0,
  fb:"No insipidus não há glicose na urina; a grande diurese vem da falta de ADH (problema na hipófise), que impede a reabsorção adequada de água nos rins. Já o mellitus tem glicose na urina e relação com a insulina."},
 {q:"Comparando o sistema nervoso e o sistema endócrino, qual afirmação está correta?",
  o:["O nervoso usa impulsos elétricos, é rápido e localizado; o endócrino usa hormônios, é mais lento e de ação ampla", "Ambos usam apenas hormônios para se comunicar", "O endócrino é mais rápido que o nervoso", "O nervoso distribui suas mensagens pelo sangue", "O endócrino tem ação sempre restrita a uma única célula"],c:0,
  fb:"O sistema nervoso é eletroquímico, veloz e de ação localizada; o endócrino é químico (hormônios pelo sangue), mais lento, porém de ação ampla (sistêmica) e igualmente eficiente."},
 {q:"A adrenalina é chamada de 'hormônio da luta e da fuga' porque, em situações de medo ou estresse, ela:", lvl:"AVANÇADA",
  o:["Aumenta as frequências cardíaca e respiratória e converte glicogênio em glicose, preparando o corpo para reagir", "Reduz o metabolismo e induz o sono", "Diminui a glicose no sangue para poupar energia", "Bloqueia o sistema nervoso temporariamente", "Aumenta a deposição de cálcio nos ossos"],c:0,
  fb:"Liberada pelas suprarrenais sob estímulo nervoso, a adrenalina acelera coração e respiração e libera glicose (a partir do glicogênio), fornecendo energia rápida para 'lutar ou fugir'."},
];
/* ===================================== */

let idx=0, score=0, streak=0, bestStreak=0, answered=false;
const cardArea=document.getElementById('cardArea');
const pfill=document.getElementById('pfill');
const counter=document.getElementById('counter');
const streakEl=document.getElementById('streak');
const streakN=document.getElementById('streakn');
document.getElementById('intro').textContent=`${QUESTIONS.length} questões • escolha a alternativa correta e veja a explicação`;

function shuffled(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function render(){
  answered=false;
  const item=QUESTIONS[idx];
  counter.textContent=`Questão ${idx+1} de ${QUESTIONS.length}`;
  pfill.style.width=`${(idx/QUESTIONS.length)*100}%`;
  const letters=['A','B','C','D','E'];
  const order=shuffled(item.o.map((_,i)=>i));   // embaralha as alternativas existentes
  const opts=order.map((orig,pos)=>`
    <button class="opt" data-i="${orig}" onclick="choose(${orig})">
      <span class="letter">${letters[pos]}</span>
      <span class="otext">${item.o[orig]}</span>
      <span class="mark"></span>
    </button>`).join('');
  cardArea.innerHTML=`
    <div class="card">
      <div class="qnum">Questão ${idx+1}${item.lvl?` <span class="lvl">🔴 ${item.lvl}</span>`:''}</div>
      <div class="qtext">${item.q}</div>
      <div id="opts">${opts}</div>
      <div class="fb" id="fb"></div>
      <button class="next" id="next" onclick="nextQ()">${idx===QUESTIONS.length-1?'Ver resultado 🏁':'Próxima →'}</button>
    </div>`;
}

function choose(i){
  if(answered) return; answered=true;
  const item=QUESTIONS[idx];
  document.querySelectorAll('.opt').forEach(b=>{
    const bi=+b.dataset.i; b.disabled=true;
    if(bi===item.c){ b.classList.add('correct'); b.querySelector('.mark').textContent='✅'; }
    if(bi===i && i!==item.c){ b.classList.add('wrong'); b.querySelector('.mark').textContent='❌'; }
  });
  const fb=document.getElementById('fb');
  if(i===item.c){
    score++; streak++; bestStreak=Math.max(bestStreak,streak);
    fb.className='fb ok show'; fb.innerHTML=`<div class="fbtitle">✅ Acertou!</div>${item.fb}`;
  } else {
    streak=0;
    fb.className='fb no show'; fb.innerHTML=`<div class="fbtitle">❌ Não foi dessa vez</div>${item.fb}`;
  }
  updateStreak();
  document.getElementById('next').classList.add('show');
}

function updateStreak(){
  if(streak>=2){ streakN.textContent=streak; streakEl.classList.add('show');
    streakEl.classList.remove('pop'); void streakEl.offsetWidth; streakEl.classList.add('pop'); }
  else streakEl.classList.remove('show');
}

function nextQ(){ idx++; if(idx>=QUESTIONS.length) showFinal(); else { render(); window.scrollTo({top:0,behavior:'smooth'}); } }

function showFinal(){
  pfill.style.width='100%'; counter.textContent='Concluído!'; streakEl.classList.remove('show');
  document.getElementById('quiz').classList.add('hidden');
  const fs=document.getElementById('finalScreen'); fs.classList.remove('hidden');
  const pct=Math.round((score/QUESTIONS.length)*100);
  let medal,msg;
  if(pct===100){medal='🏆';msg='Perfeito! Você dominou o capítulo!';}
  else if(pct>=80){medal='🥇';msg='Excelente! Você manda muito bem.';}
  else if(pct>=60){medal='🥈';msg='Bom trabalho! Já está afiado.';}
  else if(pct>=40){medal='🥉';msg='Tá no caminho — revise e tente de novo!';}
  else {medal='📚';msg='Bora revisar o resumo e voltar mais forte!';}
  fs.innerHTML=`
    <div class="medal">${medal}</div>
    <h2>${msg}</h2>
    <div class="pct">${pct}%</div>
    <div class="score">Você acertou ${score} de ${QUESTIONS.length} questões</div>
    <div class="stats">
      <div class="stat"><div class="big">${score}/${QUESTIONS.length}</div><div class="lbl">Acertos</div></div>
      <div class="stat"><div class="big">🔥 ${bestStreak}</div><div class="lbl">Maior sequência</div></div>
      <div class="stat"><div class="big">${pct}%</div><div class="lbl">Aproveitamento</div></div>
    </div>
    <button class="restart" onclick="restart()">🔄 Refazer o quiz</button>`;
  window.scrollTo({top:0,behavior:'smooth'});
  if(pct>=70) confetti();
}

function restart(){
  idx=0; score=0; streak=0; bestStreak=0;
  document.getElementById('finalScreen').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  render(); window.scrollTo({top:0,behavior:'smooth'});
}

function confetti(){
  const colors=['#3B82F6','#7C5CFF','#00A86B','#FF8A3D','#E53935','#FFD93D'];
  for(let i=0;i<120;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=Math.random()*100+'vw'; c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    const dur=2.5+Math.random()*2, delay=Math.random()*1.5;
    c.style.animation=`fall ${dur}s ${delay}s linear forwards`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),(dur+delay)*1000+200);
  }
}
const _s=document.createElement('style');
_s.textContent=`@keyframes fall{to{transform:translateY(105vh) rotate(720deg); opacity:.2;}}`;
document.head.appendChild(_s);

render();
</script>
</body>
</html>
