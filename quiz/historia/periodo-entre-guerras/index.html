<style>

  #streak-badge {

    position: fixed;

    right: 18px;

    font-size: 1rem;

    z-index: 999;
  }

    0% { transform: scale(0.5); opacity: 0; }
    80% { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }

  .card {
    background: #0d0d1f;
    border: 1.5px solid #00e5ff44;

  .q-text {

    color: #dde;
    margin-bottom: 22px;
  }

  .source-box {
    background: #111128;

    padding: 12px 16px;

    margin-bottom: 20px;
    font-style: italic;
    line-height: 1.6;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }

  .option-btn {
    background: #12122a;
    border: 1.5px solid #00e5ff55;
    color: #ccd;
    padding: 14px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.97rem;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    border-color: #00e5ff;
    background: #1a1a3a;
    color: #fff;
    box-shadow: 0 0 12px #00e5ff44;
  }
  .option-btn.correct {
    background: #0a2a0a;
    border-color: #39ff14;
    color: #39ff14;
    box-shadow: 0 0 14px #39ff1466;
  }
  .option-btn.wrong {
    background: #2a0a0a;
    border-color: #ff3355;
    color: #ff3355;
    box-shadow: 0 0 14px #ff335566;
  }
  .option-btn:disabled { cursor: default; }

  #feedback-box {
    display: none;
    margin-top: 18px;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 0.95rem;
    line-height: 1.6;
  }
  #feedback-box.correct {
    background: #0a2a0a;
    border: 1px solid #39ff14;
    color: #39ff14;
  }
  #feedback-box.wrong {
    background: #2a0a0a;
    border: 1px solid #ff3355;
    color: #ff9999;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
    gap: 12px;
  }
  .nav-btn {
    background: transparent;
    border: 1.5px solid #00e5ff;
    color: #00e5ff;
    padding: 11px 26px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: #00e5ff22; box-shadow: 0 0 10px #00e5ff55; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* FINAL SCREEN */
  #final-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 700px;
    width: 100%;
  }
  .medal { font-size: 5rem; margin-bottom: 10px; }
  .final-title { font-size: 2rem; font-weight: 900; margin-bottom: 6px; color: #00e5ff; }
  .final-sub { font-size: 1rem; color: #aab; margin-bottom: 24px; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    margin-bottom: 28px;
  }
  .stat-box {
    background: #0d0d1f;
    border: 1px solid #00e5ff44;
    border-radius: 12px;
    padding: 16px 10px;
  }
  .stat-num { font-size: 1.8rem; font-weight: 900; color: #39ff14; }
  .stat-label { font-size: 0.78rem; color: #778; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .restart-btn {
    background: linear-gradient(135deg, #00e5ff, #39ff14);
    color: #060610;
    font-weight: 900;
    font-size: 1rem;
    padding: 14px 36px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .restart-btn:hover { transform: scale(1.05); }

  canvas#confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 998;
  }

  h1.quiz-title {
    color: #00e5ff;
    font-size: 1.3rem;
    margin-bottom: 6px;
    text-align: center;
    text-shadow: 0 0 12px #00e5ff88;
  }
  .quiz-subtitle {
    color: #556;
    font-size: 0.82rem;
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }
</style>
</head>

<p class="quiz-subtitle">HISTÓRIA | 9º ANO | MÓDULO 5</p>

<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<div class="card" id="quiz-card">

<script>
const questions = [
  {
    q: "Após a Primeira Guerra Mundial, qual foi a principal diferença entre a situação dos Estados Unidos e da Europa?",
    options: [

    ],

    feedback: "Os EUA saíram fortalecidos da guerra: fizeram empréstimos à Tríplice Entente, exportaram produtos e mantiveram suas indústrias intactas. A Europa, ao contrário, foi devastada."
  },
  {
    q: "O que foi o 'American way of life' nos anos 1920?",
    options: [
      "Um movimento político que defendia a igualdade entre trabalhadores e empresários",
      "O estilo de vida americano em que a felicidade era medida pela quantidade de bens que se conseguia adquirir",
      "Uma política econômica do governo americano para reduzir a desigualdade",

    ],
    correct: 1,
    feedback: "O 'American way of life' era o estilo de vida americano baseado no consumo em massa: carros, eletrodomésticos, rádios — a felicidade era medida pela capacidade de consumir."
  },
  {
    q: "Qual era o salário médio de um trabalhador americano ao final dos anos 1920, comparado ao mínimo necessário para uma vida decente?",
    options: [
      "US$ 1.500/ano, abaixo dos US$ 1.800 considerados o mínimo necessário",
      "US$ 2.500/ano, acima do mínimo necessário",
      "US$ 1.800/ano, exatamente o mínimo necessário",
      "US$ 3.000/ano, garantindo conforto para a maioria"
    ],
    correct: 0,
    feedback: "O salário médio era de US$ 1.500/ano, abaixo dos US$ 1.800 considerados o mínimo. Pior: 42% da população vivia com menos de US$ 1.000/ano."
  },
  {
    q: "O que era a Ku Klux Klan nos anos 1920 nos Estados Unidos?",
    options: [
      "Um partido político que defendia os direitos dos trabalhadores",
      "Uma organização religiosa que promovia a paz social",
      "Uma organização racista e segregacionista com cerca de 4 milhões de membros que perseguia negros, judeus e imigrantes",
      "Um movimento cultural que celebrava a diversidade americana"
    ],
    correct: 2,
    feedback: "A KKK tinha cerca de 4 milhões de membros, cometia assassinatos e linchamentos, e não era reprimida legalmente. Sua violência era tolerada pelas autoridades."
  },
  {
    q: "O que foi a Lei Seca (Prohibition) nos Estados Unidos e qual foi um de seus principais efeitos não pretendidos?",
    options: [
      "Uma lei que proibia o tabaco e gerou crescimento do mercado ilegal de cigarros",
      "Uma lei que proibia a fabricação e comercialização de bebidas alcoólicas, aprovada em 1920, que abriu espaço para o crime organizado e as máfias",
      "Uma lei de restrição ao consumo de água que causou seca no país",
      "Uma lei que proibia greves e gerou aumento do poder dos sindicatos"
    ],
    correct: 1,
    feedback: "A Lei Seca (1920–1933) proibiu o álcool, mas gerou o efeito contrário: o contrabando floresceu, as máfias cresceram, e a violência e corrupção aumentaram muito."
  },
  {
    q: "O que é uma 'ação' no mercado financeiro?",
    options: [
      "Um empréstimo feito pelo governo a empresas privadas",
      "A menor fração do capital de uma empresa, que torna o comprador sócio e lhe dá direito a parte dos lucros",
      "Um título do governo que garante juros fixos ao investidor",
      "Um contrato de trabalho entre empresa e funcionário"
    ],
    correct: 1,
    feedback: "Uma ação é a menor fração do capital de uma empresa. Quem compra ações torna-se sócio da empresa e recebe periodicamente parte dos lucros, chamados dividendos."
  },
  {
    q: "O que é especulação financeira no contexto das bolsas de valores?",
    options: [
      "O investimento seguro e garantido em ações de grandes empresas",
      "Uma operação em que o investidor aposta que o preço das ações vai subir para lucrar, podendo incluir a manipulação artificial dos preços",
      "A compra de ações apenas por empresas do governo",
      "O controle governamental sobre os preços das ações"
    ],
    correct: 1,
    feedback: "Especulação é apostar na variação do preço das ações para lucrar. Pode incluir movimentos artificiais para aumentar ou baixar preços, enganando outros investidores."
  },
  {
    q: "Quais foram as principais causas estruturais da Crise de 1929?",
    options: [
      "Excesso de intervenção do governo na economia e aumento excessivo dos salários",
      "Concentração de renda, superprodução industrial e especulação financeira nas bolsas de valores",
      "Falta de tecnologia industrial e queda na produção agrícola",
      "Guerra comercial entre EUA e Europa e aumento das importações americanas"
    ],
    correct: 1,
    feedback: "As três causas principais foram: (1) concentração de renda — 90% da riqueza pertencia a 13% da população; (2) superprodução — produziam mais do que podiam vender; (3) especulação — bancos manipulavam preços das ações."
  },
  {
    q: "O que aconteceu na 'Quinta-feira Negra' e na 'Terça-feira Negra' de 1929?",
    options: [
      "24 de outubro: primeira grande queda da Bolsa de Nova York; 29 de outubro: pior queda da história da bolsa até então",
      "24 de outubro: falência dos bancos americanos; 29 de outubro: intervenção do governo federal",
      "24 de outubro: início da Grande Depressão; 29 de outubro: fim das exportações americanas",
      "Ambas foram dias de grandes altas na bolsa antes do colapso definitivo"
    ],
    correct: 0,
    feedback: "A Quinta-feira Negra (24/10) foi a primeira grande queda. A Terça-feira Negra (29/10) foi um dos piores dias da história de Wall Street. Ninguém queria comprar ações e os preços despencaram."
  },
  {
    q: "O que foi a Grande Depressão e quais foram seus principais efeitos nos EUA?",
    options: [
      "Um período de crescimento lento da economia americana entre 1920 e 1929",
      "O período de estagnação econômica após 1929, com falências em massa, desemprego, perda de casas e miséria generalizada",
      "Uma crise financeira restrita à bolsa de valores que não afetou a população comum",
      "Uma recessão de curta duração superada rapidamente pela livre-iniciativa do mercado"
    ],
    correct: 1,
    feedback: "A Grande Depressão foi o período pós-1929: milhões de bancos, indústrias e lojas faliram. Trabalhadores perderam empregos e casas. Grande parte da população sobrevivia em moradias improvisadas e com doações de comida."
  },
  {
    q: "Como a Crise de 1929 afetou o Brasil?",
    options: [
      "O Brasil não foi afetado porque não dependia das exportações para os EUA",
      "A crise fortaleceu o setor cafeeiro brasileiro, que encontrou novos mercados",
      "Os EUA, principais compradores do café brasileiro, pararam de comprar, causando falências, desemprego e, indiretamente, contribuindo para a Revolução de 1930",

    ],
    correct: 2,
    feedback: "O café era o principal produto de exportação brasileiro, e os EUA eram os maiores compradores. Com a crise, as compras cessaram, o preço caiu, cafeicultores faliram e o enfraquecimento das oligarquias cafeeiras abriu caminho para a Revolução de 1930."
  },
  {
    q: "Por que o Brasil queimava café em locomotivas a vapor nos anos 1930?",
    options: [
      "Para aquecer as locomotivas com mais eficiência do que o carvão mineral",
      "Para destruir estoques excedentes e tentar manter os preços do produto no mercado internacional",
      "Para protestas contra o governo e as políticas econômicas da época",
      "Para transformar o café em energia elétrica para as cidades"
    ],
    correct: 1,
    feedback: "Com a superprodução e a queda das exportações, havia café em excesso. Para tentar manter os preços, o governo queimava o produto — símbolo do desperdício do capitalismo, segundo Hobsbawm."
  },
  {
    q: "Qual foi a postura do presidente Herbert Hoover diante da Grande Depressão?",
    options: [
      "Criou um grande programa de obras públicas para gerar empregos",
      "Acreditava que a economia reagiria por si mesma sem necessidade de intervenção governamental",
      "Decretou a intervenção estatal nas principais indústrias americanas",
      "Pediu ajuda econômica urgente aos países europeus"
    ],
    correct: 1,
    feedback: "Hoover era um republicano liberal e acreditava que a livre economia se recuperaria sozinha. Isso significou ausência de intervenção governamental, aprofundando a crise por anos."
  },
  {
    q: "O que foi o New Deal e quando foi implementado?",
    options: [
      "Um acordo comercial entre EUA e Europa, firmado em 1929 para evitar a crise",
      "Um conjunto de medidas intervencionistas criadas pelo presidente Roosevelt a partir de 1933 para superar a Grande Depressão",
      "Um plano militar americano para ocupar mercados europeus após a guerra",
      "Uma reforma tributária do presidente Hoover para reduzir impostos e estimular o consumo"
    ],
    correct: 1,
    feedback: "O New Deal (Novo Acordo) foi criado por Franklin D. Roosevelt a partir de 1933, baseado nas teorias do economista John Maynard Keynes, com intervenção do Estado para recuperar a economia."
  },
  {
    q: "Qual teoria econômica embasou o New Deal de Roosevelt?",
    options: [
      "O liberalismo econômico, que defende a autorregulação do mercado sem intervenção estatal",
      "O marxismo, que defende a abolição da propriedade privada",
      "As teorias de John Maynard Keynes, que defendiam a intervenção do Estado na economia para regulá-la e evitar crises",
      "O mercantilismo, que defende o acúmulo de metais preciosos pelo Estado"
    ],
    correct: 2,
    feedback: "Keynes defendia que o liberalismo econômico (sem intervenção estatal) não era capaz de assegurar o desenvolvimento sem gerar crises. O Estado deveria intervir para regular a economia."
  },
  {
    q: "Quais foram as principais medidas do New Deal?",
    options: [
      "Privatização de empresas estatais, redução de salários e fim do seguro-desemprego",
      "Concessão de crédito a empresas, criação do salário mínimo, obras públicas, estímulo aos sindicatos e perdão de dívidas de pequenos produtores",

    ],
    correct: 1,
    feedback: "O New Deal incluiu: crédito às empresas, criação do salário mínimo, obras públicas (pontes, estradas, parques), estímulo aos sindicatos, perdão de dívidas agrícolas e limitação da superprodução."
  },
  {
    q: "Como os políticos republicanos criticaram o New Deal?",

    ],
    correct: 1,
    feedback: "Os republicanos viam o New Deal como um risco ao capitalismo: aumentava o poder federal, interferia na livre-iniciativa e os gastos públicos gerariam déficits e impostos mais altos."
  },
  {

    options: [

      "O discurso demonstra preocupação com a situação econômica da Europa pós-guerra"
    ],
    correct: 1,
    feedback: "O discurso é um exemplo claro do otimismo excessivo dos anos 1920 nos EUA. Ironicamente, foi feito às vésperas da Crise de 1929, revelando como a euforia escondia os graves problemas estruturais."

let current = 0;
let answers = new Array(questions.length).fill(null);
let streak = 0;
let maxStreak = 0;
let score = 0;

function render() {
  const q = questions[current];
  document.getElementById('q-header').textContent = `Questão ${current + 1} de ${questions.length}`;

  const srcBox = document.getElementById('source-box');
  if (q.source) {
    srcBox.style.display = 'block';
    srcBox.textContent = q.source;
  } else {
    srcBox.style.display = 'none';
  }

  document.getElementById('q-text').textContent = q.q;

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = `${String.fromCharCode(65+i)}) ${opt}`;
    btn.onclick = () => selectAnswer(i);
    if (answers[current] !== null) {
      btn.disabled = true;
      if (i === q.correct) btn.classList.add('correct');
      else if (i === answers[current]) btn.classList.add('wrong');
    }
    optDiv.appendChild(btn);
  });

  const fb = document.getElementById('feedback-box');
  if (answers[current] !== null) {
    fb.style.display = 'block';
    fb.className = answers[current] === q.correct ? 'correct' : 'wrong';
    const icon = answers[current] === q.correct ? '✅' : '❌';
    fb.textContent = `${icon} ${q.feedback}`;
  } else {
    fb.style.display = 'none';
  }

  document.getElementById('btn-back').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === questions.length - 1 ? 'Ver Resultado 🏆' : 'Próxima →';

  const pct = ((current + 1) / questions.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function selectAnswer(i) {
  if (answers[current] !== null) return;
  answers[current] = i;
  const q = questions[current];
  if (i === q.correct) {
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    showStreak();
  } else {
    streak = 0;
    hideStreak();
  }
  render();
}

function showStreak() {
  if (streak < 2) { hideStreak(); return; }
  const badge = document.getElementById('streak-badge');
  let msg = '';
  if (streak === 2) msg = `2 seguidas! 🔥`;
  else if (streak === 3) msg = `Hat-trick! 🔥🔥`;
  else if (streak === 4) msg = `Incrível! 4 seguidas! 💥`;
  else msg = `Lendário! ${streak} seguidas! 💥⚡`;
  badge.textContent = msg;
  badge.style.display = 'block';
}

function hideStreak() {
  document.getElementById('streak-badge').style.display = 'none';
}

function navigate(dir) {
  const next = current + dir;
  if (next < 0) return;
  if (next >= questions.length) {
    showFinal();
    return;
  }
  current = next;
  render();
}

function showFinal() {
  score = answers.filter((a, i) => a === questions[i].correct).length;
  const total = questions.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('progress-bar-wrap').style.display = 'none';
  hideStreak();

  const fs = document.getElementById('final-screen');
  fs.style.display = 'flex';

  let medal, title, sub;
  if (score === total) { medal = '🏆'; title = 'Perfeito!'; sub = 'Nota 10! Você dominou o Período Entreguerras!'; }
  else if (score >= total * 0.9) { medal = '🥇'; title = 'Medalha de Ouro!'; sub = 'Excelente! Quase perfeito!'; }
  else if (score >= total * 0.7) { medal = '🥈'; title = 'Medalha de Prata!'; sub = 'Muito bem! Continue estudando!'; }
  else if (score >= total * 0.5) { medal = '🥉'; title = 'Medalha de Bronze!'; sub = 'Bom esforço! Revise o material!'; }
  else { medal = '📚'; title = 'Continue Estudando!'; sub = 'Revise o resumo e tente novamente!'; }

  document.getElementById('final-medal').textContent = medal;
  document.getElementById('final-title').textContent = title;
  document.getElementById('final-sub').textContent = sub;
  document.getElementById('stat-score').textContent = `${score}/${total}`;
  document.getElementById('stat-pct').textContent = `${pct}%`;
  document.getElementById('stat-streak').textContent = maxStreak;

  if (score >= total * 0.7) launchConfetti();
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  streak = 0; maxStreak = 0; score = 0;
  document.getElementById('final-screen').style.display = 'none';
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('progress-bar-wrap').style.display = 'block';
  stopConfetti();
  render();
}

// CONFETTI
let confettiAnim = null;
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    r: Math.random() * 8 + 4,
    d: Math.random() * 3 + 1,
    color: ['#00e5ff','#39ff14','#ffff00','#ff4444','#ffffff'][Math.floor(Math.random()*5)],
    tilt: Math.random() * 10 - 5,
    tiltAngle: 0,
    tiltSpeed: Math.random() * 0.05 + 0.01
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r, p.r/2, p.tilt, 0, 2*Math.PI);
      ctx.fillStyle = p.color;
      ctx.fill();
      p.y += p.d;
      p.tiltAngle += p.tiltSpeed;
      p.tilt = Math.sin(p.tiltAngle) * 12;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
    });
    confettiAnim = requestAnimationFrame(draw);
  }
  draw();
}
function stopConfetti() {
  if (confettiAnim) cancelAnimationFrame(confettiAnim);
  const canvas = document.getElementById('confetti-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

render();
</script>
</body>
